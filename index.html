<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SNS MNM-PRO</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(8, 23, 42, .92);
      --panel-2: rgba(10, 29, 50, .78);
      --line: rgba(78, 121, 153, .32);
      --text: #f6fbff;
      --soft: #a9c9e8;
      --muted: #71859a;
      --violet: #8d6bff;
      --cyan: #20d4c7;
      --blue: #2e89e8;
      --green: #49d17f;
      --amber: #ffbf47;
      --danger: #ff6d7a;
      --shadow: 0 18px 70px rgba(0, 0, 0, .38);
      --radius: 14px;
      color-scheme: dark;
      font-family: Inter, "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }
    a, button, input, textarea, select, p, h1, h2, h3, h4, span, strong, label, div, li, td, th {
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }
    html { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(2, 12, 25, .75), rgba(2, 12, 25, .96)),
        url("./assets/sns-mnm-pro-logo-20260621.jpg") center top / cover fixed no-repeat,
        var(--bg);
      color: var(--text);
      overflow-x: hidden;
      letter-spacing: 0;
    }
    body.menu-open { overflow: hidden; }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    .app {
      display: grid;
      grid-template-columns: 288px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      background: rgba(4, 9, 18, .96);
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .brand, .top-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(32, 212, 199, .24);
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(7, 24, 43, .95);
      flex: 0 0 auto;
    }
    .brand-mark img { width: 32px; height: 32px; object-fit: contain; }
    .brand-logo {
      width: 180px;
      max-width: 100%;
      height: 62px;
      border: 1px solid rgba(32, 212, 199, .24);
      border-radius: 10px;
      object-fit: cover;
      object-position: center;
      background: rgba(7, 24, 43, .95);
      flex: 0 0 auto;
      box-shadow: 0 12px 34px rgba(0, 0, 0, .26);
    }
    .sidebar .brand-mark, .mobile-menu-brand .brand-mark {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .sidebar .brand-mark img, .mobile-menu-brand .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .topbar-logo { width: 142px; height: 52px; }
    .mobile-logo { width: min(48vw, 176px); height: 58px; }
    .brand strong, .top-brand strong {
      display: block;
      font-size: 15px;
      letter-spacing: .10em;
      white-space: nowrap;
    }
    .brand span, .top-brand span {
      display: block;
      color: var(--soft);
      font-size: 10px;
      letter-spacing: .16em;
      margin-top: 3px;
    }

    .nav {
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 12px;
    }
    .nav-title, .menu-group-title {
      display: block;
      color: #637187;
      font-size: 12px;
      font-weight: 800;
      margin: 8px 8px 6px;
    }
    .nav button, .menu-row {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #a3afbd;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      text-align: left;
      padding: 9px 10px;
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }
    .nav button:hover, .nav button.active, .menu-row:hover, .menu-row.active {
      color: #fff;
      background: rgba(141, 107, 255, .14);
    }
    .nav button.pro-locked, .menu-row.pro-locked {
      color: rgba(172, 187, 203, .56);
      background: rgba(255, 255, 255, .025);
    }
    .nav button.pro-locked.active, .nav button.pro-locked:hover,
    .menu-row.pro-locked.active, .menu-row.pro-locked:hover {
      color: rgba(255, 255, 255, .76);
      background: rgba(141, 107, 255, .10);
    }
    .pro-badge {
      justify-self: end;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255, 191, 71, .34);
      border-radius: 999px;
      color: #ffe6a8;
      background: rgba(255, 191, 71, .10);
      width: 30px;
      height: 30px;
      padding: 0;
    }
    .menu-label-inline {
      min-width: 0;
      justify-self: start;
      width: fit-content;
      max-width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
      white-space: nowrap;
      overflow-wrap: anywhere;
    }
    .pro-inline-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      min-height: 18px;
      border: 0;
      color: #ffe6a8;
      background: rgba(255, 191, 71, .10);
      border: 1px solid rgba(255, 191, 71, .22);
      border-radius: 999px;
      padding: 1px 6px;
      line-height: 1;
      gap: 3px;
      font-size: 10px;
      font-weight: 900;
    }
    .pro-badge svg, .pro-inline-badge svg {
      display: block;
      width: 16px;
      height: 16px;
      fill: currentColor;
      filter: drop-shadow(0 0 6px rgba(255, 191, 71, .32));
    }
    .pro-inline-badge svg {
      width: 12px;
      height: 12px;
    }
    .soon-badge {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      margin-left: auto;
      white-space: nowrap;
      color: #bcd2ff;
      background: rgba(124, 160, 255, .12);
      border: 1px solid rgba(124, 160, 255, .26);
      border-radius: 999px;
      padding: 2px 8px;
      line-height: 1;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .02em;
    }
    .soon-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      padding: 10px 14px;
      border-radius: 12px;
      color: #cfe0ff;
      background: rgba(124, 160, 255, .10);
      border: 1px solid rgba(124, 160, 255, .24);
      font-size: 13px;
      font-weight: 700;
    }
    .soon-banner b { color: #e7f0ff; }
    .demo-switcher {
      margin: 0 0 12px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(141, 107, 255, .10);
      border: 1px solid rgba(141, 107, 255, .28);
    }
    .demo-switcher-title { display: block; font-size: 10px; font-weight: 800; color: #cdbcff; letter-spacing: .04em; margin-bottom: 7px; }
    .demo-switch-row { display: flex; gap: 5px; }
    .demo-switch-btn {
      flex: 1 1 0; min-width: 0;
      padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(8, 16, 28, .6);
      color: var(--soft);
      font-size: 11px; font-weight: 800;
      cursor: pointer;
    }
    .demo-switch-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--violet), var(--blue));
      border-color: transparent;
    }
    .demo-banner {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin: 0 0 14px; padding: 10px 14px;
      border-radius: 12px;
      color: #e7e0ff;
      background: rgba(141, 107, 255, .12);
      border: 1px solid rgba(141, 107, 255, .32);
      font-size: 13px;
    }
    .demo-banner strong { display: block; color: #f1ecff; }
    .demo-banner span { color: #c8bcec; font-size: 12px; }
    .demo-banner .small-btn { flex: 0 0 auto; }
    .diag-result { display: grid; gap: 14px; }
    .diag-head { display: grid; gap: 8px; }
    .diag-score { display: flex; align-items: baseline; gap: 10px; }
    .diag-score span { color: var(--soft); font-size: 13px; }
    .diag-score strong { font-size: 34px; line-height: 1; color: #e7f0ff; }
    .diag-score strong small { font-size: 14px; color: var(--soft); margin-left: 2px; }
    .diag-summary { margin: 0; color: var(--soft); font-size: 13px; line-height: 1.7; }
    .diag-block { display: grid; gap: 6px; }
    .diag-block > strong { font-size: 13px; color: #cfe0ff; }
    .diag-block ul { margin: 0; padding-left: 18px; display: grid; gap: 4px; }
    .diag-block li { font-size: 13px; line-height: 1.6; }
    .diag-block p { margin: 0; font-size: 13px; line-height: 1.7; color: var(--soft); }
    .diag-compare { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .diag-col { border: 1px solid var(--line); border-radius: 12px; padding: 12px; display: grid; gap: 10px; background: rgba(8, 16, 28, .5); }
    .diag-col-win { border-color: rgba(124, 160, 255, .4); background: rgba(124, 160, 255, .08); }
    .diag-col-head { display: flex; align-items: center; gap: 8px; }
    .diag-col-head strong { font-size: 14px; }
    .diag-col-score { margin-left: auto; color: var(--soft); font-size: 13px; font-weight: 800; }
    .diag-research-list { display: grid; gap: 12px; }
    .guide-quick-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 4px 0 18px; }
    .guide-quick-btn {
      display: flex; align-items: center; gap: 10px; text-align: left;
      padding: 12px; border-radius: 12px; cursor: pointer;
      border: 1px solid rgba(124, 160, 255, .24);
      background: rgba(124, 160, 255, .08);
      color: #e5f4ff;
    }
    .guide-quick-btn:hover { background: rgba(124, 160, 255, .16); }
    .guide-quick-emoji { font-size: 22px; flex: 0 0 auto; }
    .guide-quick-text { display: grid; gap: 2px; min-width: 0; }
    .guide-quick-text strong { font-size: 13px; }
    .guide-quick-text small { color: var(--soft); font-size: 11px; }
    .guide-group { margin-top: 18px; }
    .guide-group-title { font-size: 14px; margin: 0 0 10px; color: #dbe7ff; }
    .guide-card-emoji { margin-right: 7px; }
    .guide-steps { margin: 0; padding-left: 20px; display: grid; gap: 5px; }
    .guide-steps li { line-height: 1.6; }
    @media (max-width: 560px) { .guide-quick-grid { grid-template-columns: 1fr; } }
    @media (max-width: 760px) { .diag-compare { grid-template-columns: 1fr; } }
    .nav button:hover { transform: translateX(2px); }
    .menu-symbol {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #fff;
      background: rgba(255, 255, 255, .06);
      flex: 0 0 auto;
    }
    .menu-symbol svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .nav button.active .menu-symbol, .menu-row.active .menu-symbol {
      background: linear-gradient(135deg, var(--violet), var(--blue));
    }
    .pill {
      border: 1px solid rgba(169, 201, 232, .18);
      border-radius: 999px;
      background: rgba(8, 23, 42, .78);
      color: var(--soft);
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255,255,255,.06);
      padding-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .user-dot {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: linear-gradient(135deg, #3a276f, #5e36d8);
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .sidebar-footer strong, .menu-footer strong { display: block; }
    .sidebar-footer span, .menu-footer span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .workspace { min-width: 0; max-width: 100%; overflow-x: hidden; }
    .desktop-topbar, .mobile-topbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 17, 31, .86);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .mobile-topbar { display: none; }
    .page-title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }
    .page-title p {
      margin: 3px 0 0;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.45;
    }
    .icon-btn, .ghost-btn, .small-btn, .primary {
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      background: rgba(10, 29, 50, .82);
      min-height: 40px;
      padding: 9px 13px;
    }
    .icon-btn {
      width: 42px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 22px;
    }
    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .primary {
      border: 0;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      font-weight: 900;
      display: inline-grid;
      place-items: center;
      text-align: center;
      text-decoration: none;
    }
    .primary.violet { background: linear-gradient(135deg, var(--violet), var(--blue)); }
    .primary:disabled, .ghost-btn:disabled {
      opacity: .52;
      cursor: not-allowed;
    }
    .small-btn { min-height: 34px; padding: 7px 10px; font-size: 12px; }

    main { padding: 22px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-shell {
      width: 100%;
      max-width: 1120px;
      display: grid;
      gap: 16px;
      min-width: 0;
    }
    .compact-shell { max-width: 880px; }
    .panel, .metric, .card, .result-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .panel, .card { padding: 18px; min-width: 0; }
    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }
    .panel-head h2, .card h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }
    .panel-head p, .card p, .muted {
      margin: 5px 0 0;
      color: var(--soft);
      line-height: 1.6;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .hero {
      min-height: 228px;
      border: 0;
      border-radius: 0;
      background: rgba(6, 17, 31, .88);
      box-shadow: none;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("./assets/sns-mnm-pro-logo-20260621.jpg") center center / cover no-repeat;
      opacity: 0;
      transform: scale(1.018);
      filter: saturate(.92) brightness(.62);
      animation: heroImageReveal 2.8s ease-out .12s forwards;
    }
    @keyframes heroImageReveal {
      0% {
        opacity: 0;
        transform: scale(1.018);
        filter: saturate(.88) brightness(.56);
      }
      45% {
        opacity: .34;
      }
      to {
        opacity: .94;
        transform: scale(1);
        filter: saturate(1.08) brightness(.9);
      }
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .metric {
      min-height: 126px;
      padding: 18px;
      display: grid;
      gap: 12px;
      min-width: 0;
      overflow: hidden;
    }
    .metric-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(141, 107, 255, .16);
      color: var(--violet);
      font-weight: 900;
    }
    .metric strong { font-size: 34px; line-height: 1; }
    .metric span { color: var(--soft); }
    .growth {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 20px;
      align-items: center;
    }
    .donut {
      width: 150px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) 0 69%, rgba(255,255,255,.09) 69% 100%);
      display: grid;
      place-items: center;
      position: relative;
    }
    .donut::after {
      content: "";
      width: 94px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #071426;
      position: absolute;
    }
    .donut-label {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .donut-label strong { display: block; font-size: 24px; }
    .donut-label span { color: var(--soft); font-size: 12px; }
    .analytics-visual {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      border: 1px solid rgba(32, 212, 199, .22);
      border-radius: 14px;
      background: rgba(7, 17, 30, .72);
      padding: 16px;
      margin: 14px 0;
    }
    .analysis-donut {
      width: 156px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) 0 var(--progress, 62%), rgba(255,255,255,.09) var(--progress, 62%) 100%);
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .analysis-donut::after {
      content: "";
      width: 98px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #071426;
      position: absolute;
    }
    .analysis-donut .donut-label {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .analysis-donut .donut-label strong { font-size: 23px; }
    .analysis-donut .donut-label span { font-size: 11px; }
    .sync-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 14px;
    }
    .analytics-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 12px 0 16px;
    }
    .analytics-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(7, 17, 30, .82);
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }
    .analytics-card span {
      color: var(--soft);
      font-size: 12px;
      font-weight: 800;
    }
    .analytics-card strong {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      margin-top: 7px;
    }
    .analytics-card small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 7px;
      line-height: 1.4;
    }
    .mini-ring {
      width: 70px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--ring-color, var(--cyan)) 0 var(--ring, 60%), rgba(255,255,255,.09) var(--ring, 60%) 100%);
      display: grid;
      place-items: center;
      position: relative;
      justify-self: end;
    }
    .mini-ring::after {
      content: "";
      width: 44px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #071426;
      position: absolute;
    }
    .mini-ring b {
      position: relative;
      z-index: 1;
      font-size: 12px;
      line-height: 1;
    }
    .mini-grid, .form-grid, .output-grid, .plan-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .mini-grid.three, .plan-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .mini-stat, .select-card, .output-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8, 16, 28, .72);
      padding: 14px;
    }
    .mini-stat span { display: block; color: var(--soft); font-size: 12px; }
    .mini-stat strong { display: block; font-size: 24px; margin-top: 6px; }
    .pro-gate {
      border-color: rgba(255, 191, 71, .34);
      background: linear-gradient(135deg, rgba(255, 191, 71, .10), rgba(141, 107, 255, .10));
    }
    .threads-status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .threads-status .mini-stat strong { font-size: 18px; }
    .masked-secret {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .08em;
    }

    label { display: grid; gap: 7px; color: var(--soft); font-size: 13px; }
    .field-help {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(169, 201, 232, .18);
      border-radius: 10px;
      background: rgba(4, 12, 22, .72);

    function createTrialWindow(startValue = "") {
      const fallback = new Date();

      return {
        trialStartedAt: safeStart.toISOString(),
        trialExpiresAt: new Date(safeStart.getTime() + trialDays * 24 * 60 * 60 * 1000).toISOString(),
        trialStatus: "active"
      };
    }

    function normalizeTrialWindow(parsed = {}) {
      const base = createTrialWindow(parsed.trialStartedAt);
      const expiresAt = parsed.trialExpiresAt || base.trialExpiresAt;
      let status = parsed.trialStatus || "active";
      if (status === "active" && new Date(expiresAt).getTime() <= Date.now()) status = "expired";
      return {
        trialStartedAt: parsed.trialStartedAt || base.trialStartedAt,
        trialExpiresAt: expiresAt,
        trialStatus: status
      };
    }

        return `<div class="notice success">管理者フルアクセスです。全プラン機能を利用できます。無料トライアル制限は適用されません。</div>`;
      }
      return state.apiKeyConfigured
        ? `<div class="notice success">OpenAI APIキーは登録済みです。AI生成には、ご自身のOpenAI APIキーを使用します。</div>`
        : `<div class="notice error">API未設定です。AI生成ボタンを使うには、設定画面でOpenAI APIキーを登録してください。</div>`;
    }

    function last4(value) {
      const clean = String(value || "").trim();
      return clean.length >= 4 ? clean.slice(-4) : "";
    }

    function threadsConnectionLabel() {
      const labels = {
        disconnected: "未連携",
        connected: "連携済み",
        error: "接続エラー",
        expired: "期限切れ"
      };
      return labels[state.threads.connectionStatus] || "未連携";
    }

    function threadsStatusNotice() {
      if (state.threads.connectionStatus === "connected") {
        const remain = state.threads.tokenDaysRemaining === null || state.threads.tokenDaysRemaining === undefined ? "未取得" : `残り${state.threads.tokenDaysRemaining}日`;
        const warning = state.threads.reconnectCritical
          ? "\n期限がかなり近いです。再連携を強くおすすめします。"
          : state.threads.reconnectRecommended
            ? "\n期限が近づいています。早めにトークン更新または再連携してください。"
            : "";
        return `Threads連携済みです。\n接続対象: ${state.threads.accountHandle || dedicatedSnsAccount.threads}\nThreads User ID: ${state.threads.threadsUserId || "未取得"}\nトークン期限: ${state.threads.tokenExpiresAt || "未取得"}（${remain}）${warning}\n最終同期日時: ${state.threads.lastSyncedAt || "未同期"}\nフォロワー数管理へ反映できます。`;
      }
      if (state.threads.connectionStatus === "error") {
        return `Threads連携に失敗しました。再連携を行ってください。\n${state.threads.lastError || ""}`;
      }
      if (state.threads.connectionStatus === "expired") {
        return `Threadsトークンの期限が切れています。\n「Threadsと再連携」から再取得してください。`;
      }
      return `Threads連携が未設定です。\n「Threadsと連携」ボタンからMeta認証へ進んでください。\n購入者はMeta App SecretやAccess Tokenを手入力する必要はありません。`;
    }

    function nowLabel() {
      const date = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function collectThreadsConfig() {
      return collect("#threadsApiForm");
    }

    function applyThreadsOAuthConnection(connection) {
      if (!connection) return;
      state.threads.connectionStatus = connection.connection_status || state.threads.connectionStatus || "disconnected";
      state.threads.threadsUserId = connection.threads_user_id || state.threads.threadsUserId || "";
      if (connection.threads_username) state.threads.accountHandle = `@${String(connection.threads_username).replace(/^@/, "")}`;
      state.threads.accessTokenLast4 = connection.access_token_last4 || state.threads.accessTokenLast4 || "";
      state.threads.tokenExpiresAt = connection.token_expires_at || "";
      state.threads.tokenDaysRemaining = connection.token_days_remaining ?? null;
      state.threads.reconnectRecommended = Boolean(connection.reconnect_recommended);
      state.threads.reconnectCritical = Boolean(connection.reconnect_critical);
      state.threads.reconnectLevel = connection.reconnect_level || "ok";
      state.threads.reconnectWarningDays = connection.reconnect_warning_days || 14;
      state.threads.reconnectCriticalDays = connection.reconnect_critical_days || 7;
      state.threads.lastTestedAt = connection.last_tested_at || state.threads.lastTestedAt || "";
      state.threads.lastSyncedAt = connection.last_synced_at || state.threads.lastSyncedAt || "";
      state.threads.oauthConnectedAt = connection.oauth_connected_at || state.threads.oauthConnectedAt || "";
    }

    async function syncThreadsOAuthStatus({ silent = false } = {}) {
      if (isPreviewMode()) return null;
      try {
        const data = await apiFetchJson("/api/threads/oauth/status");
        applyThreadsOAuthConnection(data.connection);
        saveState();
        if (!silent) {
          showResult("#threadsApiStatus", threadsStatusNotice(), state.threads.connectionStatus === "error" || state.threads.connectionStatus === "expired");
          showToast("Threads連携状態を更新しました");
        }
        return data;
      } catch (error) {
        if (!silent) {
          showResult("#threadsApiStatus", error.message || "Threads連携状態を取得できませんでした", true);
          showToast("Threads連携状態を取得できませんでした");
        }
        return null;
      }
    }

    function persistThreadsConfig(values) {
      state.threads.metaAppId = values.metaAppId || state.threads.metaAppId || "";
      state.threads.threadsUserId = values.threadsUserId || state.threads.threadsUserId || "";
      state.threads.tokenExpiresAt = values.tokenExpiresAt || state.threads.tokenExpiresAt || "";
      if (values.metaAppSecret) state.threads.metaAppSecretLast4 = last4(values.metaAppSecret);
      if (values.accessToken) state.threads.accessTokenLast4 = last4(values.accessToken);
    }

    function validateThreadsConfig(values) {
      if (!(values.metaAppId || state.threads.metaAppId)) return "Meta App IDを入力してください";
      if (!(values.threadsUserId || state.threads.threadsUserId)) return "Threads User IDを入力してください";
      if (!(values.accessToken || state.threads.accessTokenLast4)) return "Access Tokenを入力してください";
      return "";
    }

    async function callThreadsApi(action, payload) {
      try {
        const response = await fetch(`/api/threads/${action}`, {
          method: "POST",
          credentials: "include",
          headers: {
            "content-type": "application/json",
            ...(isAdminViewRequested() ? { "X-SNS-MNM-Admin-View": "1" } : {})
          },
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => null);
        if (!response.ok) return data || { ok: false, message: "Threads連携が未設定です。設定画面からThreadsと連携してください。" };
        return data;
      } catch {
        return { ok: false, message: "Threads APIテストに失敗しました。ログイン状態を確認してください。" };
      }
    }

    async function runThreadsConnectionTest(action) {
      if (isPreviewMode()) {
        showResult("#threadsApiStatus", uiPreviewActionMessage, true);
        showToast(uiPreviewActionMessage);
        return;
      }
      const payload = {};
      const result = await callThreadsApi(action, payload);
      state.threads.connectionStatus = result?.ok === false ? "error" : "connected";
      state.threads.lastTestedAt = nowLabel();
      state.threads.lastError = result?.ok === false ? (result.message || "接続確認に失敗しました") : "";
      if (result?.connection) applyThreadsOAuthConnection(result.connection);
      if (action === "followers" && result?.followers) {
        state.threads.previousFollowers = Number(result.followers.previous || state.threads.previousFollowers);
        state.threads.currentFollowers = Number(result.followers.current || state.threads.currentFollowers);
        state.threads.currentValueAt = nowLabel();
        state.threads.lastSyncedAt = nowLabel();
      }
      if (action === "followers" && !result) {
        state.threads.lastSyncedAt = nowLabel();
        state.threads.currentValueAt = nowLabel();
      }
      saveState();
      const fallbackMessages = {
        test: "Threads API接続テスト形式の確認に成功しました。Workers接続後は実APIで検証します。",
        followers: `フォロワー数取得テスト形式の確認に成功しました。\n前回同期 ${Number(state.threads.previousFollowers).toLocaleString("ja-JP")} → 現在 ${Number(state.threads.currentFollowers).toLocaleString("ja-JP")}`,
        posts: "投稿一覧取得テスト形式の確認に成功しました。実API接続後は投稿ID・本文・作成日時を取得します。"
      };
      const message = result?.message || fallbackMessages[action] || "Threads APIテストを実行しました。";
      showResult("#threadsApiStatus", message, state.threads.connectionStatus === "error");
      showToast(state.threads.connectionStatus === "connected" ? "Threads API接続テストが完了しました" : "Threads API接続に失敗しました");
      renderPage("settings", { keepScroll: true });
    }

    function normalizeModelMode(value) {
      const text = String(value || "");
      if (text.includes("低")) return "low_cost";
      if (text.includes("高")) return "high_quality";
      if (["low_cost", "standard", "high_quality"].includes(text)) return text;
      return "standard";
    }

    function modelLabelFromMode(mode) {
      return { low_cost: "低コスト", standard: "標準", high_quality: "高品質" }[mode] || "標準";
    }

    async function apiFetchJson(url, options = {}) {
      const headers = {
        "content-type": "application/json",
        ...(isAdminViewRequested() ? { "X-SNS-MNM-Admin-View": "1" } : {}),
        ...(options.headers || {})
      };
      const response = await fetch(url, {
        credentials: "include",
        ...options,
        headers
      });
      let data = null;
      try { data = await response.json(); } catch { data = null; }
      if (!response.ok || data?.ok === false) {
        const error = new Error(data?.message || data?.error || "API request failed");
        error.status = response.status;
        error.data = data;
        throw error;
      }
      return data;
    }

    function safeApiMessage(error, fallback) {
      const code = error?.data?.error_code || "";
      if (code === "OPENAI_API_KEY_NOT_CONFIGURED") return "設定画面でOpenAI APIキーを登録してください";
      if (code === "OPENAI_API_KEY_INVALID") return "OpenAI API接続に失敗しました。APIキーと利用状況を確認してください";
      if (code === "OPENAI_QUOTA_OR_RATE_LIMIT") return "OpenAI残高または利用制限の可能性があります。OpenAIアカウントの利用状況を確認してください";
      if (code === "OPENAI_OUTPUT_INCOMPLETE") return "生成結果が途中で切れました。生成数を減らすか、もう一度お試しください";
      if (code === "OPENAI_SCHEMA_INVALID") return "生成結果の形式指定に問題があります。画面を更新して再度お試しください";
      if (code === "OPENAI_INVALID_REQUEST") return "生成リクエストの形式に問題があります。入力内容を短くするか、生成数を減らして再度お試しください";
      if (code === "OPENAI_REFUSAL") return "入力内容により生成できませんでした。表現を少し変えてもう一度お試しください";
      if (code === "AI_JSON_PARSE_FAILED" || code === "OPENAI_JSON_PARSE_FAILED") return "生成結果の形式を読み取れませんでした。もう一度お試しください";
      return error?.data?.message || error?.message || fallback;
    }

    function formatAiOutput(feature, output) {
      if (!output) return "";
      const detailed = isAdminViewRequested();
      if (feature === "day-generate") {
        return (output.posts || []).map((post) => {
          const basic = [
            `【${post.slot || "投稿"}】`,
            post.recommended_time ? `推奨投稿時間: ${post.recommended_time}` : "",
            "",
            post.body || "",
            "",
            post.cta ? `CTA案: ${post.cta}` : ""
          ];
          const detail = detailed ? [
            "",
            "【検証メモ】",
            post.role ? `役割: ${post.role}` : "",
            post.aim ? `狙い: ${post.aim}` : "",
            post.reader_emotion ? `読者感情: ${post.reader_emotion}` : "",
            post.concrete_scene ? `具体場面: ${post.concrete_scene}` : "",
            post.self_check?.total ? `品質スコア: ${post.self_check.total}/50` : ""
          ] : [];
          return [...basic, ...detail].filter(Boolean).join("\n");
        }).join("\n\n");
      }
      if (feature === "rewrite") {
        const basic = [
          "【ブラッシュアップ後投稿】",
          output.rewritten_post || "",
          "",
          output.cta ? `【CTA】\n${output.cta}` : "",
          output.recommended_use ? `【おすすめ用途】\n${output.recommended_use}` : ""
        ];
        const detail = detailed ? [
          "",
          "【検証メモ】",
          output.hook ? `冒頭フック: ${output.hook}` : "",
          output.concrete_scene_added ? `追加した具体場面: ${output.concrete_scene_added}` : "",
          output.reader_emotion_added ? `拾った読者感情: ${output.reader_emotion_added}` : "",
          "【変更ポイント】",
          ...(output.change_points || []).map((item) => `・${item}`),
          output.differences ? `元投稿との違い: ${output.differences}` : "",
          output.self_check?.total ? `【品質スコア】\n${output.self_check.total}/50` : ""
        ] : [];
        return [...basic, ...detail].filter(Boolean).join("\n");
      }
      if (feature === "cta") {
        return (output.posts || []).slice(0, 1).map((post) => {
          const basic = [
            "【完成投稿文】",
            post.body || "",
            "",
            post.cta ? `CTA候補: ${post.cta}` : ""
          ];
          const detail = detailed ? [
            "",
            "【詳細】",
            post.aim ? `追加した問いの狙い: ${post.aim}` : "",
            post.cta_type ? `会話目的: ${post.cta_type}` : "",
            post.platform_note ? `改善ポイント: ${post.platform_note}` : "",
            post.self_check?.total ? `品質スコア: ${post.self_check.total}/50` : ""
          ] : [];
          return [...basic, ...detail].filter(Boolean).join("\n");
        }).join("\n\n");
      }
      return (output.posts || []).map((post, index) => {
        const basic = [
          `【投稿案 ${index + 1}】`,
          post.title ? `投稿タイトル: ${post.title}` : "",
          "",
          post.body || "",
          "",
          post.cta ? `CTA案: ${post.cta}` : ""
        ];
        const detail = detailed ? [
          "",
          "【検証メモ】",
          post.hook ? `冒頭フック: ${post.hook}` : "",
          post.concrete_scene ? `具体場面: ${post.concrete_scene}` : "",
          post.reader_emotion ? `読者感情: ${post.reader_emotion}` : "",
          post.aim ? `狙い: ${post.aim}` : "",
          post.target ? `想定ターゲット: ${post.target}` : "",
          post.improvement ? `改善ポイント: ${post.improvement}` : "",
          post.platform_note ? `投稿先別の調整メモ: ${post.platform_note}` : "",
          post.self_check?.total ? `品質スコア: ${post.self_check.total}/50` : ""
        ] : [];
        return [...basic, ...detail].filter(Boolean).join("\n");
      }).join("\n\n");
    }

    function topicFromAiOutput(feature, input, output) {
      if (feature === "day-generate") return input.theme || "1日分生成";
      if (feature === "rewrite") return "ブラッシュアップ";
      if (feature === "bulk-generate") return input.topics?.split(/\n/).find(Boolean) || input.topic || "一括生成";
      if (feature === "thread" || feature === "series") return input.theme || aiFeatures[feature] || feature;
      return input.topic || output?.posts?.[0]?.title || aiFeatures[feature] || feature;
    }

    function featureLabel(feature) {
      if (feature === "rewrite") return "ブラッシュアップ";
      return aiFeatures[feature] || pageMeta[feature]?.[0] || feature || "AI生成";
    }

    function contentModeForFeature(feature, input = {}) {
      if (feature === "day-generate") return "multi_slot";
      if (feature === "rewrite") return "rewrite";
      if (feature === "thread") return "thread";
      if (feature === "series") return "series";
      if (feature === "bulk-generate") return "bulk";
      if ((input.channel || "") === "X" && feature === "ai-post") return "x_short";
      return "single";
    }

    function groupTypeLabel(mode) {
      return {
        single: "単発",
        thread: "スレッド",
        multi_slot: "朝昼夜",
        rewrite: "ブラッシュアップ",
        series: "シリーズ",
        bulk: "一括候補",
        x_short: "X短文"
      }[mode] || "単発";
    }

    function displayText(value) {
      return normalizeGeneratedText(String(value || ""))
        .replace(/lack of traction/gi, "反応が伸びない状態")
        .replace(/low traction/gi, "反応が弱い状態");
    }

    function normalizeGeneratedText(value = "") {
      return String(value || "")
        .replace(/スイカを丸ごと渡されても食べにくいけど、切ってあれば手が伸びる[。.]?/g, "大きすぎるテーマをそのまま渡されても読みにくいですが、小さく切り分けると受け取りやすくなります。")
        .replace(/スイカを丸ごと渡されても/g, "大きすぎるテーマをそのまま渡されても")
        .replace(/切ってあれば手が伸びる/g, "小さく切り分けると受け取りやすくなります")
        .replace(/一口サイズ/g, "小さな切り口")
        .replace(/suika|watermelon/gi, "大きなテーマ")
        .replace(/スイカ/g, "大きなテーマ");
    }

    function stripGeneratedMetaFooter(text = "") {
      return displayText(text)
        .split("\n---\n")[0]
        .replace(/\n投稿先:\s*[\s\S]*$/m, "")
        .replace(/\n参照プロフィール:\s*[\s\S]*$/m, "")
        .replace(/\nOpenAI接続準備:\s*[\s\S]*$/m, "")
        .trim();
    }

    function stripPostMetaFromBlock(block = "") {
      return stripGeneratedMetaFooter(block)
        .replace(/^投稿本文:\s*/m, "")
        .replace(/^投稿案:\s*/m, "")
        .replace(/\n(?:CTA案|CTA候補):[\s\S]*$/m, "")
        .replace(/\n(?:狙い|その日の狙い|推奨投稿時間|品質スコア|検証メモ|投稿先別の調整メモ|投稿先別メモ|参照プロフィール|OpenAI接続準備|改善ポイント|想定ターゲット|投稿タイトル|参考タイトル):[\s\S]*$/m, "")
        .trim();
    }

    function extractPostBodyFromBlock(block = "") {
      const clean = stripGeneratedMetaFooter(block);
      const marker = clean.match(/(?:投稿本文|投稿案):\s*\n?([\s\S]*)/);
      const body = marker ? marker[1] : clean;
      return stripPostMetaFromBlock(body);
    }

    function extractCtaFromBlock(block = "") {
      const match = String(block || "").match(/(?:CTA案|CTA候補|【CTA】)\s*:?\s*\n?([^\n]+)/);
      return displayText(match?.[1] || "").trim();
    }

    function childLabelFor(feature, outputPostsLength, index, post = {}) {
      if (post.slot) return post.slot;
      if (feature === "thread") return index === 0 ? "投稿1" : `リプ欄${index + 1}`;
      if (feature === "series") return `${index + 1}日目`;
      if (feature === "bulk-generate") return `候補 ${index + 1}`;
      if (feature === "cta") return "完成投稿";
      if (feature === "ai-post" && outputPostsLength > 1) return `投稿案 ${index + 1}`;
      return "投稿本文";
    }

    function fallbackChildrenFromText(feature, text = "") {
      const body = stripGeneratedMetaFooter(text);
      if (!body) return [];
      if (feature === "cta") {
        return [{
          id: `${Date.now()}_cta`,
          post_index: 1,
          post_label: "完成投稿文",
          role: "",
          text: stripPostMetaFromBlock(body.replace(/^【完成投稿文】\s*/m, "")),
          cta: ""
        }].filter((child) => child.text);
      }
      const pattern = /【([^】]+)】\n([\s\S]*?)(?=\n\n【[^】]+】\n|$)/g;
      const children = [];
      let match;
      while ((match = pattern.exec(body))) {
        const index = children.length;
        const rawLabel = displayText(match[1] || "");
        const label = feature === "thread"
          ? (index === 0 ? "投稿1" : `リプ欄${index + 1}`)
          : feature === "series"
            ? `${index + 1}日目`
            : feature === "day-generate"
              ? rawLabel.replace(/：.*$/, "")
              : feature === "bulk-generate"
                ? `候補 ${index + 1}`
                : feature === "rewrite"
                  ? (index === 0 && /元投稿/.test(rawLabel) ? "元投稿" : `ブラッシュアップ案${Math.max(1, index)}`)
                  : /投稿案/.test(rawLabel)
                    ? `投稿案 ${index + 1}`
                    : rawLabel || "投稿本文";
        const block = (match[2] || "").trim();
        const roleMatch = block.match(/(?:その日の狙い|役割):\s*(.+)/);
        const timeMatch = block.match(/推奨投稿時間:\s*(.+)/);
        const ctaMatch = block.match(/(?:CTA案|CTA候補|【CTA】)\s*:?\s*\n?([^\n]+)/);
        const textPart = extractPostBodyFromBlock(block);
        children.push({
          id: `${Date.now()}_fallback_${index}`,
          post_index: index + 1,
          post_label: label,
          role: displayText(roleMatch?.[1] || rawLabel || ""),
          recommended_time: displayText(timeMatch?.[1] || ""),
          text: textPart,
          cta: displayText(ctaMatch?.[1] || "")
        });
      }
      return children;
    }

    function threadSafetyNotice(count) {
      const numeric = Number(String(count || "").replace(/[^\d]/g, "")) || 3;
      if (numeric <= 3) {
        return "連続投稿は便利ですが、短時間に同じテーマ・同じCTA・同じ外部誘導を繰り返すと、機械的な投稿やスパム的な投稿に見える可能性があります。\nCTAは最後の投稿だけにする、投稿間隔を空ける、外部リンク誘導を控えるなど、安全寄りの運用をおすすめします。";
      }
      return "4投稿以上を選択しています。\n短時間に同じテーマ・同じCTA・同じ外部誘導を繰り返すと、機械的な投稿やスパム的な投稿に見える可能性があります。\nCTAは最後の投稿だけにする、投稿間隔を空ける、外部リンク誘導を控えるなど、安全寄りの運用をおすすめします。";
    }

    function refreshThreadSafetyNotice() {
      const select = document.querySelector("#threadCountSelect");
      const notice = document.querySelector("#threadSafetyNotice");
      if (!select || !notice) return;
      const numeric = Number(String(select.value || "").replace(/[^\d]/g, "")) || 3;
      notice.textContent = threadSafetyNotice(numeric);
      notice.classList.toggle("error", numeric > 3);
    }

    const commentRiskPatterns = [
      "コメント欄に", "〇〇と書いて", "○○と書いて", "返信してください", "と返信", "キーワード", "DMください",

    function pickBySeed(candidates = [], seed = "") {
      const list = candidates.filter(Boolean);
      if (!list.length) return "";
      const total = Array.from(String(seed || "default")).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      return list[total % list.length];
    }

    function detectTopicCluster(options = {}) {
      const text = [options.inputText, options.theme, options.keyword, options.purpose, options.postType].join(" ").toLowerCase();
      if (/ネタ|構成|文章化|書けない/.test(text)) return "idea";
      if (/ai|違う|違和感|しっくり/.test(text)) return "ai_mismatch";
      if (/続か|継続|止まる|習慣/.test(text)) return "consistency";
      if (/反応|いいね|保存|読まれ|問い合わせ/.test(text)) return "low_response";
      if (/商品|サービス|売り込み|営業|案内|価格|効果/.test(text)) return "sales_pitch";
      if (/設計/.test(text)) return "design";
      if (/自己紹介|ジャンル/.test(text)) return "intro";
      return "generic";
    }

    function detectKeywordCluster(keyword = "") {
      const text = String(keyword || "").toLowerCase();
      if (/設計/.test(text)) return "design";
      if (/継続/.test(text)) return "continuity";
      if (/反応/.test(text)) return "reaction";
      if (/案内|商品|サービス/.test(text)) return "guidance";
      if (/自己紹介|ジャンル/.test(text)) return "intro";
      if (/悩み|相談/.test(text)) return "trouble";
      return "generic";
    }

    function detectAudienceCluster(target = "") {
      const text = String(target || "").toLowerCase();
      if (/個人事業主|フリーランス|起業/.test(text)) return "solo";
      if (/講師|コンサル|先生/.test(text)) return "coach";
      if (/店舗|サロン|飲食|来店/.test(text)) return "store";
      if (/ec|物販|通販|ネットショップ/.test(text)) return "ecommerce";
      if (/採用|企業|会社|法人/.test(text)) return "hiring";
      return "generic";
    }

    function resolveToneCluster(tone = "") {
      const text = String(tone || "");
      if (text.includes("寄り添")) return "gentle";
      if (text.includes("親しみ")) return "friendly";
      if (text.includes("論理")) return "logical";
      if (text.includes("熱量")) return "energetic";
      if (text.includes("やわらか")) return "soft_guide";
      return "neutral";
    }

    function buildConversationCandidates(options = {}) {
      const topicCluster = detectTopicCluster(options);
      const keywordCluster = detectKeywordCluster(options.keyword);
      const audienceCluster = detectAudienceCluster(options.target);
      const toneCluster = resolveToneCluster(options.tone);
      const phrases = conversationPhraseLibrary();
      const understanding = analyzeUserInput("cta", {
        post: options.inputText || "",
        theme: options.theme || "",
        keyword: options.keyword || "",
        purpose: options.purpose || "",
        type: options.postType || "",
        target: options.target || ""
      }, {
        target: options.target || "",
        tone: options.tone || "",
        product: options.product || "",
        keyword: options.keyword || "",
        purpose: options.purpose || ""
      });
      const goalCandidates = conversationGoalQuestions(options, understanding, topicCluster, keywordCluster);
      const inputAwareCandidates = options.inputText ? inputAwareConversationQuestions(understanding, options, topicCluster, keywordCluster) : [];

      const toneSpecificPool = phrases.toneSpecific[toneCluster] || {};
      const themeCandidates = toneSpecificPool[topicCluster]?.length ? toneSpecificPool[topicCluster] : (phrases.baseThemes[topicCluster] || []);
      const keywordAlias = {
        continuity: "consistency",
        reaction: "low_response",
        guidance: "sales_pitch",
        trouble: "generic"
      };
      const toneSpecificKeywordKey = keywordAlias[keywordCluster] || keywordCluster;
      const keywordCandidates = toneSpecificPool[toneSpecificKeywordKey]?.length ? toneSpecificPool[toneSpecificKeywordKey] : (phrases.baseKeywords[keywordCluster] || []);
      const audienceCandidates = phrases.audience[audienceCluster] || [];

      const primaryPool = (keywordCluster !== "generic" && keywordCandidates.length)
        ? keywordCandidates
        : (topicCluster !== "generic" && themeCandidates.length)
          ? themeCandidates
          : audienceCandidates.length
            ? audienceCandidates
            : (phrases.baseThemes.generic || []);

      const fallbackPool = [
        ...(audienceCluster !== "generic" ? audienceCandidates : []),
        ...(topicCluster !== "generic" ? themeCandidates : []),
        ...(keywordCluster !== "generic" ? keywordCandidates : []),
        options.keyword ? `「${options.keyword}」という言葉で思い浮かぶ悩みがあれば、ひとつ教えてください。` : "",
        topicCluster === "generic" && keywordCluster === "generic" && options.product ? `${options.product}のような仕組み化で気になっている点があれば、ひとつ教えてください。` : ""
      ];
      const selectedPool = primaryPool.length ? primaryPool : fallbackPool.filter(Boolean);
      return [...new Set([...goalCandidates, ...inputAwareCandidates, ...selectedPool].filter(Boolean))];
    }

    function conversationGoalQuestions(options = {}, understanding = {}, topicCluster = "generic", keywordCluster = "generic") {
      const goal = String(options.conversationGoal || options.postType || "").trim();
      const source = `${options.inputText || ""}\n${options.theme || ""}\n${options.keyword || ""}\n${options.gift || ""}`;
      const shapeContext = /型|かたち|形|設計|構成|流れ/.test(source + String(understanding.key_concept || ""));
      const sideBusinessContext = /副業|スレッズ|Threads|投稿|発信/.test(source + String(understanding.main_claim || ""));
      const salesContext = /商品|サービス|案内|売り込み|営業|申込/.test(source + goal);
      const reactionContext = /反応|いいね|保存|読まれ|問い合わせ/.test(source + goal);
      const questions = {
        "悩みを聞く": shapeContext
          ? ["投稿が止まる時って、ネタ不足と型が決まっていないこと、どちらが大きいですか？"]
          : ["今の投稿でいちばん引っかかっている悩みは、ネタ・文章化・反応のどれに近いですか？"],
        "状況を聞く": reactionContext
          ? ["反応が薄い時、まず見直すのは冒頭・内容・導線のどれですか？"]
          : ["今の発信状況に近いものは、ネタ切れ・反応不足・案内しづらい、のどれですか？"],
        "自己紹介してもらう": sideBusinessContext
          ? ["同じように副業発信をしている人は、自己紹介がてら今どんなテーマで投稿しているか教えてください。"]
          : ["自己紹介がてら、今どんなテーマで発信しているか教えてください。"],
        "体験談を聞く": ["同じように、投稿前に手が止まった経験はありますか？"],
        "どちら派か聞く": shapeContext
          ? ["あなたは投稿前に、ネタ探しから始めていますか？\nそれとも先に型を決めていますか？"]
          : ["投稿で詰まる時、先に見直すのはテーマですか？それとも文章の流れですか？"],
        "商品案内につなげる": salesContext || shapeContext
          ? ["発信を続ける仕組みを作る時、いちばん整えたいのはネタ出し・型・投稿管理のどれですか？"]
          : ["商品やサービスの案内で、いちばん言いにくいのはどこですか？"],
        "固定投稿へ自然に流す": ["あとで見返すなら、まず固定投稿にまとめてほしいのは手順・考え方・チェック項目のどれですか？"],
        "プロフィールへ自然に流す": ["このテーマに近い発信をしている人は、プロフィールで一番確認したいのは実績・考え方・サービス内容のどれですか？"],
        "保存してもらう": ["あとで見返すなら、この投稿で残しておきたいのは考え方・手順・見直しポイントのどれですか？"]
      };
      const selected = questions[goal] || [];
      if (selected.length) return selected;
      if (options.gift) return [`${options.gift}につなげるなら、読者にまず聞きたい状況は何ですか？`];
      return [];
    }

    function inputAwareConversationQuestions(understanding = {}, options = {}, topicCluster = "generic", keywordCluster = "generic") {
      const source = `${options.inputText || ""}\n${options.theme || ""}\n${options.keyword || ""}`;
      const claim = String(understanding.main_claim || "");
      const concept = String(understanding.key_concept || "");
      const metaphor = String(understanding.metaphor_or_unique_expression || "");
      const candidates = [];
      const mentionsShape = /型|かたち|形|設計|構成|流れ/.test(source + claim + concept);
      const mentionsIdea = /ネタ|投稿|続か|副業|Threads|スレッズ/.test(source + claim);
      const mentionsAi = /AI|なんか違う|違和感|自分の言葉/.test(source + claim);
      const mentionsReaction = /反応|いいね|読まれ|問い合わせ/.test(source + claim);
      const mentionsSales = /商品|サービス|案内|売り込み|営業/.test(source + claim);

      if (mentionsIdea && mentionsShape) {
        candidates.push("あなたは投稿前に、ネタ探しから始めていますか？\nそれとも先に型を決めていますか？");
        candidates.push("投稿が止まる時って、ネタがないというより、先に型が決まっていないことありませんか？");
      }
      if (metaphor && mentionsShape) {
        candidates.push("先に地図や型がある時と、何もないまま探す時で、投稿の進みやすさは変わると思いませんか？");
      }
      if (mentionsAi) {
        candidates.push("AIに任せた時、どこで「自分の言葉じゃない」と感じやすいですか？");
        candidates.push("AIの文章で直したくなるのは、口調ですか？それとも前提のズレですか？");
      }
      if (mentionsReaction) {
        candidates.push("反応が薄い時、まず見直したくなるのは冒頭・内容・導線のどこですか？");
      }
      if (mentionsSales) {
        candidates.push("案内文を書く時、売り込みっぽく見えそうで手が止まることはありますか？");
      }
      if (!candidates.length && topicCluster !== "generic") {
        candidates.push(...((conversationPhraseLibrary().baseThemes[topicCluster] || []).slice(0, 2)));
      }
      if (!candidates.length && keywordCluster !== "generic") {
        candidates.push(...((conversationPhraseLibrary().baseKeywords[keywordCluster] || []).slice(0, 2)));
      }
      if (!candidates.length) {
        candidates.push("投稿前に手が止まる時、いちばん迷うのは最初の一文ですか？それとも全体の流れですか？");
      }
      return candidates;
    }

    function naturalQuestionCta(arg1 = {}, target = "", product = "", tone = "", theme = "", postType = "", salesTone = "", purpose = "", channel = "") {
      const options = normalizeConversationOptions(arg1, target, product, tone, theme, postType, salesTone, purpose, channel);
      const seed = [options.theme, options.keyword, options.target, options.tone, options.postType, options.conversationGoal, options.gift, options.purpose].join("|");
      const candidates = buildConversationCandidates(options);
      return pickBySeed(candidates, seed) || "今いちばん投稿で悩んでいることを、一言でいうと何ですか？";
    }

    function safeConversationCta(rawCta = "", keyword = "", target = "", product = "", tone = "", theme = "", postType = "", salesTone = "", purpose = "", channel = "") {
      const options = normalizeConversationOptions(keyword && typeof keyword === "object" ? keyword : {
        keyword, target, product, tone, theme, postType, salesTone, purpose, channel
      });
      const text = String(rawCta || "").trim();
      if (!text) return naturalQuestionCta(options);
      if (commentRiskPatterns.some((pattern) => text.includes(pattern))) {
        return naturalQuestionCta({ ...options, rawCta: text });
      }
      return text;
    }

    function conversationImprovementCandidates(options = {}) {
      const baseOptions = normalizeConversationOptions(options);
      const variants = [
        naturalQuestionCta({ ...baseOptions, tone: baseOptions.tone || "寄り添う形" }),
        naturalQuestionCta({ ...baseOptions, keyword: baseOptions.keyword || "悩み共有", tone: "論理的" }),
        naturalQuestionCta({ ...baseOptions, keyword: baseOptions.keyword || "案内", tone: "やわらかい案内型" })
      ];
      return [...new Set(variants.filter(Boolean))].slice(0, 3);
    }

    function analyzeCommentInducement(text = "", options = {}) {
      const body = String(text || "");
      const matchedPatterns = commentRiskPatterns.filter((pattern) => body.includes(pattern));
      const repeatedCtaCount = (body.match(/返信してください|保存して|プロフィール|コメントしてください|URL|DMください|リンクはこちら/g) || []).length;
      const questionPressureCount = (body.match(/教えてください|話してください|コメント|返信/g) || []).length;
      const keywordReplyCount = (body.match(/と返信|キーワード|合言葉|「はい」で|はいで/g) || []).length;
      const incentiveCount = (body.match(/無料|特典|資料|プレゼント|配布|受け取れ/g) || []).length;
      const dmCount = (body.match(/DM|リプください|リプで|リプ欄で/g) || []).length;
      const forceCount = (body.match(/してください|してね|必ず|今すぐ/g) || []).length;
      const thinValue = body.length < 90 && (matchedPatterns.length + keywordReplyCount + incentiveCount) >= 2;
      const score = (matchedPatterns.length ? 2 : 0)
        + (repeatedCtaCount >= 2 ? 1 : 0)
        + (keywordReplyCount >= 1 ? 1 : 0)
        + (incentiveCount >= 1 ? 1 : 0)
        + (dmCount >= 1 ? 1 : 0)
        + (forceCount >= 2 ? 1 : 0)
        + (thinValue ? 1 : 0);
      const label = score >= 5 ? "高" : score >= 2 ? "中" : "低";
      const reasons = [];
      if (matchedPatterns.length) reasons.push(`検出語: ${matchedPatterns.join(" / ")}`);
      if (keywordReplyCount) reasons.push("キーワード返信型の誘導が含まれています");
      if (incentiveCount) reasons.push("無料・特典・資料系の誘導が含まれています");
      if (dmCount) reasons.push("DM / リプ誘導が含まれています");
      if (repeatedCtaCount >= 2) reasons.push("同じCTAが重なっています");
      if (forceCount >= 2) reasons.push("返信を強めに促しています");
      if (thinValue) reasons.push("価値提供より先に返信誘導が目立っています");
      return { score, label, matchedPatterns, reasons, repeatedCtaCount, keywordReplyCount, incentiveCount, dmCount, forceCount, thinValue };
    }

    function normalizeGeneratedChildren(feature, output = {}, input = {}, fallbackText = "") {
      if (feature === "day-generate") {
        const fallbackSlots = ["朝投稿", "昼投稿", "夜投稿"];
        return (output.posts || []).map((post, index) => ({
          id: `${Date.now()}_${index}`,
          post_index: index + 1,
          post_label: post.slot || fallbackSlots[index] || `${index + 1}回目`,
          role: displayText(post.role || post.aim || ""),
          aim: displayText(post.aim || ""),
          quality_score: post.self_check?.total || "",
          recommended_time: post.recommended_time || "",
          text: displayText(post.body || ""),
          cta: displayText(post.cta || "")
        })).filter((child) => child.text || child.cta);
      }
      if (feature === "rewrite") {
        const children = [];
        if (input.source) {
          children.push({
            id: `${Date.now()}_source`,
            post_index: 0,
            post_label: "元投稿",
            role: "ブラッシュアップ元",
            text: displayText(input.source),
            cta: ""
          });
        }
        children.push({
          id: `${Date.now()}_rewrite`,
          post_index: 1,
          post_label: "ブラッシュアップ案1",
          role: displayText(output.recommended_use || "改善後投稿"),
          aim: displayText((output.change_points || []).join(" / ")),
          quality_score: output.self_check?.total || "",
          text: displayText(output.rewritten_post || stripPostMetaFromBlock(fallbackText)),
          cta: displayText(output.cta || "")
        });
        return children.filter((child) => child.text || child.cta);
      }
      if (Array.isArray(output.posts) && output.posts.length) {
        return output.posts.map((post, index) => ({
          id: `${Date.now()}_${index}`,
          post_index: index + 1,
          post_label: childLabelFor(feature, output.posts.length, index, post),
          role: displayText(post.role || post.aim || ""),
          transition: displayText(post.transition || ""),
          emotional_role: displayText(post.emotional_role || ""),
          aim: displayText(post.aim || ""),
          recommended_time: post.recommended_time || "",
          quality_score: post.self_check?.total || "",
          text: displayText(post.body || ""),
          cta: displayText(post.cta || ""),
          title: displayText(post.title || ""),
          hook: displayText(post.hook || ""),
          concrete_scene: displayText(post.concrete_scene || ""),
          reader_emotion: displayText(post.reader_emotion || ""),
          target: displayText(post.target || ""),
          improvement: displayText(post.improvement || ""),
          platform_note: displayText(post.platform_note || "")
        })).filter((child) => child.text || child.cta);
      }
      const fallbackChildren = fallbackChildrenFromText(feature, fallbackText);
      if (fallbackChildren.length) return fallbackChildren;
      return [{
        id: `${Date.now()}_single`,
        post_index: 1,
        post_label: "投稿本文",
        role: "",
        text: extractPostBodyFromBlock(fallbackText),
        cta: ""
      }];
    }

    function recordTextFromChildren(children = [], fallback = "") {
      const text = (children || []).map((child) => {
        const cta = child.cta ? `\n\n${child.cta}` : "";
        return `${child.text || ""}${cta}`.trim();
      }).filter(Boolean).join("\n\n");
      return text || extractPostBodyFromBlock(fallback) || "";
    }

    function recordBodyTextFromChildren(children = [], fallback = "") {
      const text = (children || []).map((child) => {
        return `${child.text || ""}`.trim();
      }).filter(Boolean).join("\n\n");
      return text || extractPostBodyFromBlock(fallback) || "";
    }

    function childCopyText(child, includeCta = false) {
      const body = extractPostBodyFromBlock(child.text || "");
      const cta = includeCta && child.cta ? `\n\n${displayText(child.cta)}` : "";
      return `${body}${cta}`.trim();
    }

    function diagnosisTopic(feature, input) {
      if (feature === "ab-test") return "投稿AB比較";
      if (feature === "score") return "見込み客スコア";
      if (feature === "buzz-pattern") return "自然会話パターン分析";
      if (feature === "buzz-research") return `トークテーマ: ${displayText(input.theme || input.topic || "")}`.slice(0, 30);
      const post = displayText(input.post || "");
      return post ? `スコア診断: ${post.slice(0, 18)}${post.length > 18 ? "…" : ""}` : "投稿前スコア診断";
    }

    function diagnosisScoreLabels() {
      return {
        clarity: "伝わりやすさ",
        hook: "冒頭の引き",
        empathy: "共感",
        concreteness: "具体性",
        readability: "読みやすさ",
        cta_naturalness: "導線の自然さ"
      };
    }

    function clampScore(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return 0;
      return Math.max(0, Math.min(100, Math.round(num)));
    }

    function scoreBarsHtml(scores = {}) {
      const labels = diagnosisScoreLabels();
      return `<div class="output-grid">${Object.keys(labels).map((key) => {
        const pct = clampScore(scores[key]);
        return `<div class="output-card"><strong>${labels[key]}</strong><div class="bar"><span style="width:${pct}%"></span></div><small>${pct}/100</small></div>`;
      }).join("")}</div>`;
    }

    function bulletList(title, items = []) {
      const clean = (items || []).map((item) => displayText(item)).filter(Boolean);
      if (!clean.length) return "";
      return `<div class="diag-block"><strong>${title}</strong><ul>${clean.map((item) => `<li>${esc(item)}</li>`).join("")}</ul></div>`;
    }

    function improvedPostBlock(title, text) {
      const body = displayText(text || "");
      if (!body) return "";
      return `<div class="diag-block"><strong>${title}</strong><div class="post-text">${esc(body)}</div></div>`;
    }

    function renderDiagnosisResult(feature, output = {}) {
      if (feature === "ab-test") return renderAbCompareResult(output);
      if (feature === "score") return renderLeadScoreResult(output);
      if (feature === "buzz-pattern") return renderBuzzPatternResult(output);
      if (feature === "buzz-research") return renderBuzzResearchResult(output);
      const overall = clampScore(output.overall_score);
      return `<div class="diag-result">
        <div class="diag-head"><div class="diag-score"><span>総合スコア</span><strong>${overall}<small>/100</small></strong></div>
          <p class="diag-summary">${esc(displayText(output.summary || ""))}</p></div>
        ${scoreBarsHtml(output.scores)}
        ${bulletList("良い点", output.strengths)}
        ${bulletList("弱い点", output.weaknesses)}
        ${bulletList("改善案", output.improvements)}
        ${bulletList("注意フラグ", output.risk_flags)}
        ${improvedPostBlock("改善版の投稿文", output.improved_post)}
        <div class="notice">これはAIによる伝わりやすさ診断です。伸びを保証するものではありません。</div>
      </div>`;
    }

    function renderAbCompareResult(output = {}) {
      const winner = displayText(output.winner || "引き分け");
      const winnerLabel = winner === "A" ? "投稿案A" : winner === "B" ? "投稿案B" : "引き分け";
      const column = (label, overall, scores, strengths, weaknesses, isWinner) => `
        <div class="diag-col${isWinner ? " diag-col-win" : ""}">
          <div class="diag-col-head"><strong>${label}</strong><span class="diag-col-score">${clampScore(overall)}/100</span>${isWinner ? `<span class="soon-badge">推奨</span>` : ""}</div>
          ${scoreBarsHtml(scores)}
          ${bulletList("良い点", strengths)}
          ${bulletList("弱い点", weaknesses)}
        </div>`;
      return `<div class="diag-result">
        <div class="diag-head"><div class="diag-score"><span>判定</span><strong>${esc(winnerLabel)}</strong></div>
          <p class="diag-summary">${esc(displayText(output.summary || ""))}</p></div>
        <div class="diag-compare">
          ${column("投稿案A", output.a_overall, output.a_scores, output.a_strengths, output.a_weaknesses, winner === "A")}
          ${column("投稿案B", output.b_overall, output.b_scores, output.b_strengths, output.b_weaknesses, winner === "B")}
        </div>
        ${output.reason ? `<div class="diag-block"><strong>判定理由</strong><p>${esc(displayText(output.reason))}</p></div>` : ""}
        ${bulletList("改善案", output.improvements)}
        ${improvedPostBlock("推奨案（軽く改善済み）", output.recommended_post)}
        <div class="notice">これはAIによる伝わりやすさ比較です。伸びを保証するものではありません。</div>
      </div>`;
    }

    function renderLeadScoreResult(output = {}) {
      const score = clampScore(output.lead_score);
      const temp = displayText(output.temperature || "");
      const push = displayText(output.push_caution || "");
      return `<div class="diag-result">
        <div class="diag-head"><div class="diag-score"><span>見込み客スコア</span><strong>${score}<small>/100</small></strong>${temp ? `<span class="pill">温度感: ${esc(temp)}</span>` : ""}</div>
          <p class="diag-summary">${esc(displayText(output.summary || ""))}</p></div>
        ${bulletList("温度の根拠", output.signals)}
        ${improvedPostBlock("次に送るべき返信文", output.next_reply)}
        <div class="diag-block"><strong>押しすぎ注意度</strong><p>${esc(push || "中")}${output.caution_note ? ` ／ ${esc(displayText(output.caution_note))}` : ""}</p></div>
        ${bulletList("改善のヒント", output.improvements)}
        <div class="notice">これはAIによる目安診断です。成約を保証するものではありません。</div>
      </div>`;
    }

    function buzzTypeBarsHtml(scores = {}) {
      const map = { save: "保存型", empathy: "共感型", guide: "案内型" };
      return `<div class="output-grid">${Object.keys(map).map((key) => {
        const pct = clampScore(scores[key]);
        return `<div class="output-card"><strong>${map[key]}スコア</strong><div class="bar"><span style="width:${pct}%"></span></div><small>${pct}/100</small></div>`;
      }).join("")}</div>`;
    }

    function renderBuzzPatternResult(output = {}) {
      const dominant = displayText(output.dominant_type || "");
      return `<div class="diag-result">
        <div class="diag-head"><div class="diag-score"><span>強いパターン</span><strong style="font-size:24px">${esc(dominant || "—")}</strong></div>
          <p class="diag-summary">${esc(displayText(output.summary || ""))}</p></div>
        ${buzzTypeBarsHtml(output.scores)}
        ${bulletList("良い点", output.strengths)}
        ${bulletList("弱い点", output.weaknesses)}
        ${bulletList("改善案", output.improvements)}
        ${improvedPostBlock("改善した投稿例", output.rewrite_suggestion)}
        <div class="notice">投稿文の傾向をAIでスコア化した目安です。</div>
      </div>`;
    }

    function renderBuzzResearchResult(output = {}) {
      const themes = Array.isArray(output.themes) ? output.themes : [];
      const cards = themes.map((t, i) => `
        <div class="diag-col">
          <div class="diag-col-head"><strong>${i + 1}. ${esc(displayText(t.theme || ""))}</strong></div>
          ${t.why ? `<div class="diag-block"><strong>会話が生まれやすい理由</strong><p>${esc(displayText(t.why))}</p></div>` : ""}
          ${t.angle ? `<div class="diag-block"><strong>切り口</strong><p>${esc(displayText(t.angle))}</p></div>` : ""}
          ${t.example_opening ? improvedPostBlock("冒頭の例", t.example_opening) : ""}
        </div>`).join("");
      return `<div class="diag-result">
        <div class="diag-head"><p class="diag-summary">${esc(displayText(output.summary || ""))}</p></div>
        <div class="diag-research-list">${cards}</div>
        <div class="notice">${esc(displayText(output.notice || "外部SNSデータは使用していません。AIによる提案です。"))}</div>
      </div>`;
    }

    function diagnosisPlainText(feature, output = {}) {
      const labels = diagnosisScoreLabels();
      if (feature === "score") {
        return [
          `見込み客スコア: ${clampScore(output.lead_score)}/100`,
          `温度感: ${displayText(output.temperature || "")}`,
          output.summary ? displayText(output.summary) : "",
          output.next_reply ? `次に送るべき返信文:\n${displayText(output.next_reply)}` : "",
          `押しすぎ注意度: ${displayText(output.push_caution || "")}${output.caution_note ? ` / ${displayText(output.caution_note)}` : ""}`
        ].filter(Boolean).join("\n");
      }
      if (feature === "buzz-pattern") {
        return [
          `強いパターン: ${displayText(output.dominant_type || "")}`,
          `保存型: ${clampScore(output.scores?.save)}/100 ・ 共感型: ${clampScore(output.scores?.empathy)}/100 ・ 案内型: ${clampScore(output.scores?.guide)}/100`,
          output.summary ? displayText(output.summary) : "",
          (output.improvements || []).length ? `改善案:\n${(output.improvements || []).map((i) => `・${displayText(i)}`).join("\n")}` : "",
          output.rewrite_suggestion ? `改善した投稿例:\n${displayText(output.rewrite_suggestion)}` : ""
        ].filter(Boolean).join("\n");
      }
      if (feature === "buzz-research") {
        const themes = Array.isArray(output.themes) ? output.themes : [];
        return [
          output.summary ? displayText(output.summary) : "",
          ...themes.map((t, i) => `${i + 1}. ${displayText(t.theme || "")}\n　理由: ${displayText(t.why || "")}\n　切り口: ${displayText(t.angle || "")}\n　冒頭例: ${displayText(t.example_opening || "")}`)
        ].filter(Boolean).join("\n\n");
      }
      if (feature === "ab-test") {
        const winner = displayText(output.winner || "引き分け");
        const lines = [
          `判定: ${winner === "A" ? "投稿案A" : winner === "B" ? "投稿案B" : "引き分け"}`,
          output.summary ? displayText(output.summary) : "",
          `投稿案A 総合: ${clampScore(output.a_overall)}/100`,
          `投稿案B 総合: ${clampScore(output.b_overall)}/100`,
          output.reason ? `判定理由: ${displayText(output.reason)}` : "",
          (output.improvements || []).length ? `改善案:\n${(output.improvements || []).map((item) => `・${displayText(item)}`).join("\n")}` : "",
          output.recommended_post ? `推奨案:\n${displayText(output.recommended_post)}` : ""
        ];
        return lines.filter(Boolean).join("\n");
      }
      const scoreLines = Object.keys(labels).map((key) => `${labels[key]}: ${clampScore(output.scores?.[key])}/100`).join("\n");
      const lines = [
        `総合スコア: ${clampScore(output.overall_score)}/100`,
        output.summary ? displayText(output.summary) : "",
        scoreLines,
        (output.strengths || []).length ? `良い点:\n${(output.strengths || []).map((item) => `・${displayText(item)}`).join("\n")}` : "",
        (output.weaknesses || []).length ? `弱い点:\n${(output.weaknesses || []).map((item) => `・${displayText(item)}`).join("\n")}` : "",
        (output.improvements || []).length ? `改善案:\n${(output.improvements || []).map((item) => `・${displayText(item)}`).join("\n")}` : "",
        output.improved_post ? `改善版の投稿文:\n${displayText(output.improved_post)}` : ""
      ];
      return lines.filter(Boolean).join("\n");
    }

    function diagnosisCopyText(feature, output = {}) {
      if (feature === "ab-test") return displayText(output.recommended_post || "");
      if (feature === "score") return displayText(output.next_reply || "");
      if (feature === "buzz-pattern") return displayText(output.rewrite_suggestion || "");
      if (feature === "buzz-research") {
        const themes = Array.isArray(output.themes) ? output.themes : [];
        return themes.map((t) => displayText(t.example_opening || "")).filter(Boolean).join("\n\n");
      }
      return displayText(output.improved_post || "");
    }

    function useAiFeature(feature, resultTarget, generator) {
      if (isComingSoon(feature)) {
        showResult(resultTarget, comingSoonMessage, true);
        showToast("この機能は準備中です");
        return;
      }
      if (isPreviewMode()) {
        blockPreviewAction(resultTarget);
        return;
      }
      if (!state.apiKeyConfigured && !isAdmin()) {
        showResult(resultTarget, "設定画面でOpenAI APIキーを登録してください", true);
        showToast("設定画面でOpenAI APIキーを登録してください");
        return;
      }
      if (isTrialExpired()) {
        showResult(resultTarget, "無料トライアル期間が終了しました。継続利用するにはプランを選択してください。", true, true);
        showToast("無料トライアル期間が終了しました");
        return;
      }
      const target = document.querySelector(resultTarget);
      const input = getAiInput(feature);
      const validationError = validateAiInput(feature, input);
      if (validationError) {
        showResult(resultTarget, validationError, true);
        showToast(validationError);
        return;
      }
      if (target) {
        target.classList.remove("structured-result", "notice", "error");
        target.textContent = "生成中...\n入力内容、共通プロフィール、禁止表現を確認しています。";
        target.dataset.generatedFeature = feature;
        target.dataset.copyText = "";
      }
      setTimeout(async () => {
        try {
          if (isServerDiagnosisFeature(feature)) {
            const data = await diagnoseWithServer(feature, input);
            const plain = diagnosisPlainText(feature, data.output);
            addHistory(aiFeatures[feature], diagnosisTopic(feature, input), plain, { output: data.output });
            if (target) {
              target.dataset.generatedText = plain;
              target.dataset.generatedTopic = diagnosisTopic(feature, input);
              target.dataset.generatedPlatform = input.channel || state.profile.channels || "Threads";
              target.dataset.copyText = diagnosisCopyText(feature, data.output);
            }
            showStructuredResult(resultTarget, renderDiagnosisResult(feature, data.output));
            saveState();
            refreshChrome(currentPage());
            showToast(isAdmin() ? `${aiFeatures[feature]}を管理者権限で実行しました` : `${aiFeatures[feature]}を実行しました`);
            return;
          }
          let output = null;
          if (isServerAiFeature(feature)) {
            output = await generateWithServer(feature, input);
          } else {
            output = generator(input);
          }
          addHistory(aiFeatures[feature], output.topic, output.text, output);
          const rawOutput = output.output || output;
          const generatedRecord = buildGeneratedRecord(feature, input, rawOutput, output.text, "下書き");
          if (target) {
            target.dataset.generatedText = output.text;
            target.dataset.generatedTopic = output.topic || "";
            target.dataset.generatedPlatform = output.platform || "";
            target.dataset.copyText = recordBodyTextFromChildren(generatedRecord.children, generatedRecord.text);
            generatedResultCache.set(resultTarget, generatedRecord);
          }
          if (isServerAiFeature(feature)) {
            showStructuredResult(resultTarget, renderGeneratedResultCardSet(generatedRecord));
          } else {
            showResult(resultTarget, output.text);
          }
          saveState();
          refreshChrome(currentPage());
          showToast(isAdmin() ? `${aiFeatures[feature]}を管理者権限で生成しました` : `${aiFeatures[feature]}を生成しました`);
        } catch (error) {
          const message = safeApiMessage(error, "生成に失敗しました。APIキー、通信状態、入力内容を確認してください。");
          showResult(resultTarget, message, true);
          showToast(message);
        }
      }, 450);
    }

    function showResult(selector, text, isError = false, withPlanButton = false) {
      const target = document.querySelector(selector);
      if (!target) return;
      target.classList.remove("structured-result");
      target.classList.toggle("notice", isError);
      target.classList.toggle("error", isError);
      target.innerHTML = withPlanButton
        ? `${esc(text)}\n\n<button class="primary violet" type="button" data-page="billing">お申し込みへ</button>`
        : esc(text);
    }

    function showStructuredResult(selector, html) {
      const target = document.querySelector(selector);
      if (!target) return;
      target.classList.remove("notice", "error");
      target.classList.add("structured-result");
      target.innerHTML = html;
    }

    function collect(selector) {
      const scope = document.querySelector(selector);
      const values = {};
      if (!scope) return values;
      scope.querySelectorAll("[name]").forEach((item) => values[item.name] = item.value);
      return values;
    }

    function addPost(textOrRecord, type = "AI生成", status = "下書き") {
      const channelSelector = document.querySelector("main [name='channel']");
      const record = typeof textOrRecord === "object" && textOrRecord !== null
        ? normalizePostRecord({ ...textOrRecord, status }, type, status)
        : normalizePostRecord({
            id: `post_${Date.now()}`,
            text: textOrRecord,
            type,
            feature_label: type,
            status,
            statusCode: status === "予約メモ" ? "scheduled_memo" : "draft",
            createdAt: new Date().toISOString(),
            created: new Date().toLocaleString("ja-JP"),
            schedule: "",
            channel: channelSelector ? channelSelector.value : (state.profile.channels || "Threads"),
            platform: channelSelector ? channelSelector.value : (state.profile.channels || "Threads"),
            topic: document.querySelector("main [name='topic'], main [name='theme']")?.value || type,
            target: document.querySelector("main [name='target']")?.value || state.profile.target,
            purpose: document.querySelector("main [name='purpose']")?.value || state.profile.purpose,
            cta: state.profile.cta
          }, type, status);
      state.posts.unshift(record);
      saveState();
      showToast("投稿管理へ保存しました");
    }

    function addHistory(type, topic, text, output = {}) {
      state.history.unshift({
        id: `history_${Date.now()}`,
        createdAt: new Date().toISOString(),
        time: new Date().toLocaleString("ja-JP"),
        type,
        topic,
        text,
        platform: output.platform || document.querySelector("main [name='channel']")?.value || state.profile.channels,
        promptPreview: output.promptPreview || ""
      });
      state.history = state.history.slice(0, 30);
    }

    function followerManagementPage() {

      const growth = previous ? ((diff / previous) * 100).toFixed(1) : "0.0";
      const sign = diff >= 0 ? "+" : "";
      const connected = state.threads.connectionStatus === "connected";
      const ring = Math.min(100, Math.max(6, Math.abs(Number(growth)) / 30 * 100)).toFixed(0);
      return `<section class="page active"><div class="page-shell compact-shell">
        <section class="panel">
          <div class="panel-head"><div><h2>フォロワー数管理</h2><p>Liteプランで利用できるThreads API連携の基本管理です。</p></div><span class="pill">${threadsConnectAvailable() ? threadsConnectionLabel() : "順次開放"}</span></div>

              <div class="mini-ring" style="--ring:${connected ? 88 : 18}%;--ring-color:${connected ? "var(--cyan)" : "var(--amber)"}"><b>${connected ? "OK" : "未"}</b></div>
            </div>
            <div class="analytics-card">
              <div><span>現在フォロワー数</span><strong>${current.toLocaleString("ja-JP")}</strong><small>現在値：${state.threads.currentValueAt || "未同期"}</small></div>
              <div class="mini-ring" style="--ring:${ring}%;--ring-color:var(--cyan)"><b>${sign}${growth}%</b></div>
            </div>
            <div class="analytics-card">
              <div><span>前回同期フォロワー数</span><strong>${previous.toLocaleString("ja-JP")}</strong><small>前回同期：${state.threads.lastSyncedAt || "未同期"}</small></div>

            </div>
            <div class="analytics-card">
              <div><span>増減数</span><strong>${sign}${Math.abs(diff).toLocaleString("ja-JP")}</strong><small>前回同期からの増減</small></div>
              <div class="mini-ring" style="--ring:${ring}%;--ring-color:var(--green)"><b>${sign}${growth}%</b></div>

    function getAiInput(feature) {
      const values = collect(`#${feature}Form`);
      return {
        ...values,
        feature,
