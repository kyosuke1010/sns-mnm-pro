    function validateAiInput(feature, input) {
      const required = {
        "ai-post": ["topic"],
        "day-generate": ["theme"],
        "bulk-generate": ["topics"],
        series: ["theme"],
        thread: ["theme"],
        rewrite: ["source"],
        cta: ["post"],
        viral: ["post"],
        "ab-test": ["postA", "postB"],
        score: ["reply"],
        "buzz-pattern": ["post"],
        "buzz-research": ["theme"]
      };
      const labels = {
        topic: "トピック",
        theme: "テーマ",
        topics: "テーマリスト",
        source: "元投稿文",
        post: "投稿文",
        postA: "投稿案A",
        postB: "投稿案B",
        reply: "相手の返信内容"
      };
      const missing = (required[feature] || []).find((key) => !String(input[key] || "").trim());
      return missing ? `${labels[missing] || missing}を入力してください` : "";
    }

    function modelFromQuality() {
      return "gpt-5.5";
    }

    function reasoningEffortFromQuality() {
      if (state.modelQuality === "高品質") return "high";
      if (state.modelQuality === "低コスト") return "low";
      return "medium";
    }

    function removeInstructionLikeProfileText(value = "") {
      const text = displayText(value).trim();
      if (!text) return "";
      const instructionLike = /(入力してください|返信してください|と返信|コメントしてください|コメント欄|DMください|キーワード返信|特典返信|無料配布|欲しい人|スイカ|suika|watermelon)/i;
      // 命令句だけ除去: drop only the clauses that contain an instruction/bait phrase
      // and keep the rest of the profile text (previously the whole field was cleared).
      return text
        .split(/\n+/)
        .map((line) => {
          const clauses = line.split(/(?<=[、。！？])/);
          return clauses
            .filter((clause) => clause.trim() && !instructionLike.test(clause))
            .join("")
            .replace(/^[、。・\s]+/g, "")
            .replace(/[、・\s]+$/g, "")
            .trim();
        })
        .filter(Boolean)
        .join("\n")
        .trim();
    }

    function safeProfileForGeneration(profile = {}) {
      return {
        genre: removeInstructionLikeProfileText(profile.genre),
        target: removeInstructionLikeProfileText(profile.target),
        product: removeInstructionLikeProfileText(profile.product),
        purpose: removeInstructionLikeProfileText(profile.purpose),
        tone: removeInstructionLikeProfileText(profile.tone),
        banned: removeInstructionLikeProfileText(profile.banned),
        salesTone: removeInstructionLikeProfileText(profile.salesTone),
        length: removeInstructionLikeProfileText(profile.length),
        emoji: removeInstructionLikeProfileText(profile.emoji),
        channels: profile.channels || "Threads"
      };
    }

    function profileContext(input = {}) {
      const safeProfile = safeProfileForGeneration(state.profile);
      return {
        genre: safeProfile.genre,
        target: input.target || safeProfile.target,
        tone: input.tone || safeProfile.tone,
        product: safeProfile.product,
        url: "",
        keyword: input.keyword || "",
        cta: input.cta || "",
        banned: safeProfile.banned,
        purpose: input.purpose || safeProfile.purpose,
        salesTone: safeProfile.salesTone,
        length: safeProfile.length,
        emoji: safeProfile.emoji,
        platform: input.channel || safeProfile.channels || "Threads"

    function pickPrimaryInputText(input = {}) {
      return [input.inputText, input.post, input.source, input.text, input.body, input.postA, input.reply]
        .map((value) => String(value || "").trim())
        .find(Boolean) || "";
    }

    function truncateText(value = "", max = 120) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      return text.length > max ? `${text.slice(0, max)}...` : text;
    }

    function analyzeUserInput(feature = "", input = {}, ctx = profileContext(input)) {
      const sourceText = pickPrimaryInputText(input);
      const themeText = [input.theme, input.topic, input.topics].filter(Boolean).join("\n");
      const keywordText = [input.keyword, input.keywords, ctx.keyword].filter(Boolean).join(" ");
      const targetText = [input.target, ctx.target].filter(Boolean).join(" ");
      const purposeText = [input.purpose, ctx.purpose, input.type, input.post_type].filter(Boolean).join(" ");
      const base = sourceText || themeText || keywordText || purposeText || targetText || "";
      const combined = [base, themeText, keywordText, targetText, purposeText, ctx.product].join("\n");
      const sentences = String(base).split(/[。\n!?！？]/).map((item) => item.trim()).filter(Boolean);
      const mainClaim = truncateText(sentences.find((item) => /ではなく|より|先に|大事|必要|変わる|続き|伝え|整え|決め|止ま|型|流れ/.test(item)) || sentences[0] || base || "入力テーマに沿って、読者が次に進みやすい投稿にする", 120);
      const keyConcept = inferKeyConcept(combined, keywordText, purposeText);
      const readerProblem = inferReaderProblem(combined);
      const desiredAction = inferDesiredAction(combined, purposeText, keywordText);
      const metaphorLine = String(base).split(/[。\n]/).find((line) => /ような|みたい|たとえ|比喩|地図|鍵|宝|迷路|橋|入口|出口|レール|型/.test(line));
      const risks = inferInputRiskPoints(combined);
      return {
        main_claim: mainClaim,
        reader_problem: readerProblem,
        target_reader: inferTargetReader(targetText, combined),
        desired_action: desiredAction,
        key_concept: keyConcept,
        metaphor_or_unique_expression: metaphorLine ? truncateText(metaphorLine, 120) : "",
        emotional_tone: inferEmotionalTone(combined),
        sales_intensity: inferSalesIntensity(combined, ctx.salesTone),
        risk_points: risks,
        best_generation_angle: inferBestGenerationAngle(feature, mainClaim, keyConcept),
        source_priority: sourceText ? "inputText/source/post body" : themeText ? "theme/topic" : keywordText ? "talk-theme keyword" : "generic fallback",
        source_excerpt: truncateText(base, 220)
      };
    }

    function inferReaderProblem(text = "") {
      if (/ネタ|書けない|文章化|ゼロから|構成/.test(text)) return "投稿ネタや構成を毎回ゼロから考えて手が止まる";
      if (/AI|違和感|しっくり|自分の言葉|なんか違う/.test(text)) return "AI文が自分の言葉や読者の悩みに合わず使いにくい";
      if (/続か|継続|習慣|止まる/.test(text)) return "投稿を続けたいのに負担や迷いで止まりやすい";
      if (/反応|いいね|保存|読まれ|問い合わせ|申込/.test(text)) return "投稿しても反応や次の行動につながらない";
      if (/商品|サービス|案内|売り込み|営業|価格|効果/.test(text)) return "商品やサービスを自然に案内できず売り込みっぽく見える不安がある";
      if (/設計|導線|型|流れ/.test(text)) return "投稿前の設計や導線が曖昧で迷っている";
      return "投稿で何をどう伝えれば読者が動きやすいか迷っている";
    }

    function inferTargetReader(target = "", text = "") {
      const combined = `${target} ${text}`;
      if (/個人事業主|フリーランス|副業|起業/.test(combined)) return "個人事業主・副業運用者";
      if (/講師|コンサル|先生|スクール/.test(combined)) return "講師・コンサル・専門家";
      if (/店舗|サロン|飲食|来店/.test(combined)) return "店舗・サロン運営者";
      if (/EC|ec|物販|通販|ネットショップ/.test(combined)) return "EC・物販運営者";
      if (/採用|企業|会社|法人/.test(combined)) return "企業・採用担当者";
      return target || "ThreadsやXで発信を続けたい人";
    }

    function inferDesiredAction(text = "", purpose = "", keyword = "") {
      const combined = `${text} ${purpose} ${keyword}`;
      if (/保存|見返/.test(combined)) return "保存して後から見返してもらう";
      if (/返信|悩み|相談|話しかけ|コメント/.test(combined)) return "読者が自分の状況を自然に話せるようにする";
      if (/プロフィール|固定|URL|リンク/.test(combined)) return "必要な人だけプロフィールや固定投稿へ進める";
      if (/商品|サービス|案内|申込|購入/.test(combined)) return "売り込みすぎず必要な人だけ案内へ進める";
      return "読者が自分の状況を整理し、次に見るポイントが分かるようにする";
    }

    function inferKeyConcept(text = "", keyword = "", purpose = "") {
      const combined = `${text} ${keyword} ${purpose}`;
      if (/型|かたち|テンプレ|地図|設計|流れ/.test(combined)) return "先に型や設計を決めてから投稿を作る";
      if (/悩み|言語化|読者/.test(combined)) return "読者の悩みを先に言語化する";
      if (/冒頭|1行目|最初/.test(combined)) return "冒頭で何の話か一瞬で伝える";
      if (/導線|CTA|返信|保存|プロフィール/.test(combined)) return "読後の行動導線を自然に置く";
      if (/AI|違和感|自分の言葉/.test(combined)) return "AIに任せる前に誰に何を伝えるかを決める";
      if (/売り込み|案内|商品|サービス/.test(combined)) return "商品説明より先に読者の困りごとを共有する";
      return keyword || purpose || "読者の悩みから投稿の流れを作る";
    }

    function inferEmotionalTone(text = "") {
      if (/不安|怖|迷|止ま|しんど|疲|面倒/.test(text)) return "不安や迷いを含む";
      if (/売り込み|営業|押し/.test(text)) return "売り込みへの抵抗感がある";
      if (/違和感|なんか違う|しっくり/.test(text)) return "違和感を言語化したい";
      if (/変わる|できる|進む|続く/.test(text)) return "前に進める期待がある";
      return "落ち着いた実務寄り";
    }

    function inferSalesIntensity(text = "", explicit = "") {
      const combined = `${text} ${explicit}`;
      if (/今すぐ|限定|先着|購入|申込|無料プレゼント|特典/.test(combined)) return "強め";
      if (/商品|サービス|価格|案内|プロフィール|URL|リンク/.test(combined)) return "中";
      return explicit || "弱め";
    }

    function inferInputRiskPoints(text = "") {
      const risks = [];
      if (/コメント欄に|と返信|返信してください|リプ|DM|欲しい人|無料|特典|資料|プレゼント|合言葉|はいで|「はい」で/.test(text)) risks.push("返信稼ぎ・特典誘導に見える可能性");
      if (/https?:\/\/|URL|リンク|外部/.test(text)) risks.push("外部誘導が強く見える可能性");
      if (/短時間|連投|立て続け|すぐ続けて/.test(text)) risks.push("機械的な連続投稿に見える可能性");
      if (/必ず|絶対|保証|誰でも|確実/.test(text)) risks.push("誇大表現に見える可能性");
      return risks.length ? risks : ["大きなリスクは低め。自然な問いと保存導線を優先"];
    }

    function inferBestGenerationAngle(feature, mainClaim, keyConcept) {
      const claim = mainClaim || keyConcept || "入力テーマ";
      if (feature === "rewrite") return `元文の主張「${claim}」を保ち、フック・具体性・自然な導線だけを磨く`;
      if (feature === "day-generate") return `朝は悩み共感、昼は原因整理、夜は解決と自然導線で「${claim}」を一日で展開する`;
      if (feature === "thread") return `「${claim}」を投稿1・リプ欄2・リプ欄3へ安全に分割し、CTAは最後だけに弱める`;
      if (feature === "series") return `「${claim}」を複数日に分け、問題提起から解決まで別角度で進める`;
      if (feature === "bulk-generate") return `「${claim}」から共感・保存・導線など別角度の候補を作る`;
      if (["viral", "ab-test", "buzz-pattern", "buzz-research"].includes(feature)) return `入力文の文脈を見て、リスクと改善案を断定せず提示する`;
      if (feature === "cta") return `元投稿の主張を保持し、会話目的と話しかけテーマに合わせて自然に話したくなる流れへ整える`;
      return `「${claim}」を読者の悩みから投稿本文へ落とし込む`;
    }

    function platformRule(platform) {
      if (platform === "X") {
        return "X向け: 短め、1投稿で意味が通る、冒頭を強める、不要な説明を削る、140〜280字を意識";
      }
      if (platform === "Threads / X 両方") {
        return "ThreadsとX両方: Threads用は改行多め、X用は短文化メモを付ける";
      }
      return "Threads向け: 改行多め、冒頭1行で読ませる、自然な会話調、売り込み感を出しすぎない";
    }

    function buildAiPrompt(feature, input) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput(feature, input, ctx);
      return [
        "あなたはThreads/X運用に強いSNSマーケターです。",
        "自然で売り込み感が強すぎないSNS投稿文・診断結果を作成してください。",
        "怪しい断定、誇大広告、煽りすぎ、禁止表現は避けてください。",
        "ユーザー入力の主張・比喩・文脈を最優先し、入力と関係ない導線や返信シナリオを勝手に追加しないでください。",
        "出力前に、生成文が入力理解の main_claim と best_generation_angle からズレていないか確認してください。",
        platformRule(ctx.platform),
        "",
        `機能: ${pageMeta[feature]?.[0] || feature}`,
        `発信ジャンル: ${ctx.genre}`,
        `ターゲット: ${ctx.target}`,
        `口調: ${ctx.tone}`,
        `商品名/サービス名: ${ctx.product}`,
        `禁止表現: ${ctx.banned}`,
        `投稿目的: ${ctx.purpose}`,
        `売り込み感: ${ctx.salesTone}`,
        `文章の長さ: ${ctx.length}`,
        `絵文字: ${ctx.emoji}`,
        "",
        "入力理解:",
        JSON.stringify(understanding, null, 2),
        "",
        "入力:",
        JSON.stringify(input, null, 2)
      ].join("\n");
    }

    function buildAiRequest(feature, input) {
      const prompt = buildAiPrompt(feature, input);
      return {
        endpoint: "https://api.openai.com/v1/responses",
        method: "POST",
        model: modelFromQuality(),
        prompt,
        body: {
          model: modelFromQuality(),
          input: prompt,
          reasoning: { effort: reasoningEffortFromQuality() },
          text: { verbosity: state.modelQuality === "低コスト" ? "low" : "medium" }
        }
      };
    }

    async function callOpenAi(request) {
      // OpenAI API接続ポイント。初期版では実送信せず、同じrequest構造からローカル生成します。
      // 本実装時は、購入者のAPIキーをAuthorizationヘッダーに入れてResponses APIへ送信します。
      return null;
    }

    function normalizeCount(value, fallback = 3) {
      const parsed = parseInt(String(value || "").replace(/[^0-9]/g, ""), 10);
      return Number.isFinite(parsed) && parsed > 0 ? Math.min(parsed, 10) : fallback;
    }

    function cleanOutput(text) {
      const banned = String(state.profile.banned || "").split(/[、,\s]+/).filter(Boolean);
      return banned.reduce((body, word) => body.replaceAll(word, "○○"), text);
    }

    function openingLine(topic, target, purpose, understanding = null) {
      if (understanding?.main_claim && understanding.source_priority !== "generic fallback") {
        if (String(purpose).includes("保存")) return `${understanding.key_concept}は、後で見返せる形にすると伝わりやすくなります。`;
        if (String(purpose).includes("返信")) return `${understanding.reader_problem}なら、まず状況を言葉にするところから始めると整理しやすいです。`;
        if (String(purpose).includes("商品") || String(purpose).includes("誘導")) return `${understanding.reader_problem}なら、商品説明より先に悩みの流れを整えるのが先です。`;
        return `${understanding.main_claim}`;
      }
      if (String(purpose).includes("保存")) return `${topic}は、後で見返せる形にすると反応が変わります。`;
      if (String(purpose).includes("返信")) return `${topic}で悩んでいる人ほど、まず言葉にして整理すると進みます。`;
      if (String(purpose).includes("商品") || String(purpose).includes("誘導")) return `${topic}は、売り込む前に悩みの流れを整えるのが先です。`;
      return `${target}がつまずきやすいのは、${topic}を難しく考えすぎる時です。`;
    }

    function makePostBody(topic, type, purpose, ctx, index = 1, input = {}) {
      const understanding = analyzeUserInput("ai-post", input, ctx);
      const hook = openingLine(topic, ctx.target, purpose, understanding);
      const readerProblem = understanding.reader_problem;
      const keyConcept = understanding.key_concept;
      const uniqueLine = understanding.metaphor_or_unique_expression ? `\n\n${understanding.metaphor_or_unique_expression}` : "";
      const bodyByType = {
        "共感型": `${readerProblem}\n\nそれは努力不足ではなく、${keyConcept}がまだ見えていないだけかもしれません。${uniqueLine}`,
        "保存型": `見直すポイントは3つです。\n\n1. ${readerProblem}\n2. ${keyConcept}\n3. 読後に何をしてほしいか${uniqueLine}`,
        "失敗談型": `以前は、目の前の投稿だけを整えようとしていました。\n\nでも変わったのは、${keyConcept}を先に決めてからです。${uniqueLine}`,
        "チェックリスト型": `投稿前に確認してください。\n\n□ 読者の悩みは「${readerProblem}」に近いか\n□ 主張は「${understanding.main_claim}」からズレていないか\n□ 導線が強すぎないか`,
        "比較型": `止まりやすい投稿は、伝えたいことが主役です。\n\n読まれやすい投稿は、${readerProblem}から入ります。`,
        "反論型": `投稿数を増やせば解決する、とは限りません。\n\n必要なのは、${keyConcept}です。${uniqueLine}`,
        "ストーリー型": `最初は、${readerProblem}で止まっても自然です。\n\nそこから${keyConcept}に変えるだけで、投稿の流れは作りやすくなります。`,
        "商品導線型": `${readerProblem}\n\nそこを整理してから、必要な人にだけ次の選択肢を置く。\n\n${ctx.product || "サービス"}は、その流れを作るための補助として見せると自然です。`
      };
      const cta = safeConversationCta(ctx.cta, {
        keyword: ctx.keyword,
        target: ctx.target,
        product: ctx.product,
        tone: ctx.tone,
        theme: input.source || input.post || input.topic || input.theme || understanding.main_claim,
        postType: input.type,
        salesTone: ctx.salesTone,
        purpose: input.purpose || ctx.purpose,
        channel: ctx.platform
      });
      const threadBody = `${hook}\n\n${bodyByType[type] || bodyByType["共感型"]}\n\n${cta}`;
      const xBody = `${hook} ${String(bodyByType[type] || "").replace(/\n+/g, " ")} ${cta}`.slice(0, 280);
      return ctx.platform === "X" ? xBody : `${threadBody}\n\n${index > 1 ? `投稿案${index}として、切り口を少し変えています。` : ""}`.trim();
    }

    function formatCommonFooter(ctx, request) {
      if (!isAdminViewRequested()) return "";
      return [
        "",
        "---",
        `投稿先: ${ctx.platform}`,
        `参照プロフィール: ${ctx.genre} / ${ctx.target} / ${ctx.tone}`,
        `OpenAI接続準備: ${request.endpoint} / model ${request.model}`
      ].join("\n");
    }

    function generateAiPost(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("ai-post", input, ctx);
      const count = normalizeCount(input.count, 3);
      const type = input.type || "共感型";
      const topic = input.topic;
      const posts = Array.from({ length: count }, (_, i) => {
        const body = cleanOutput(makePostBody(topic, type, input.purpose, ctx, i + 1, input));
        return [
          `【投稿案 ${i + 1}】`,
          `投稿タイトル: ${understanding.main_claim}を${type.replace("型", "")}で伝える投稿`,
          "",
          "投稿本文:",
          body,
          "",
          `狙い: ${understanding.best_generation_angle}`,
          `想定ターゲット: ${understanding.target_reader}`,
          `CTA案: ${safeConversationCta(ctx.cta, { keyword: ctx.keyword, target: ctx.target, product: ctx.product, tone: ctx.tone, theme: understanding.main_claim, postType: input.type, salesTone: ctx.salesTone, purpose: input.purpose || ctx.purpose, channel: ctx.platform })}`,
          `改善ポイント: 入力文の主張「${understanding.main_claim}」からズレないように、読者の悩みを先に置きます。`,
          `投稿先別の調整メモ: ${platformRule(ctx.platform)}`
        ].join("\n");
      }).join("\n\n");
      return { topic, platform: ctx.platform, text: `${posts}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function generateDayPosts(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("day-generate", input, ctx);
      const theme = input.theme;
      const blocks = [
        ["朝投稿", "問題提起・共感", "8:00", `${understanding.reader_problem}\n\n朝はここを言葉にするだけで十分です。\n焦って投稿数を増やす前に、まず「何で止まっているか」を1つに絞ってみてください。`, "今日の悩みを1つ書き出してみてください"],
        ["昼投稿", "原因・気づき・学び", "12:30", `${understanding.main_claim}\n\n原因はやる気ではなく、${understanding.key_concept}が決まっていないことかもしれません。\nここが見えると、投稿は作業ではなく流れになります。`, "保存して投稿前に見返してください"],
        ["夜投稿", "解決策・返信導線・案内", "20:30", `${understanding.key_concept}を整えたいなら、最後に読者が取りやすい行動を1つだけ置きます。\n\n${naturalQuestionCta({
          keyword: ctx.keyword,
          target: ctx.target,
          product: ctx.product,
          tone: ctx.tone,
          theme: understanding.main_claim,
          inputText: pickPrimaryInputText(input),
          postType: input.type,
          salesTone: ctx.salesTone,
          purpose: input.purpose || ctx.purpose,
          channel: ctx.platform
        })}\n${buildConversationGuide({
          keyword: ctx.keyword,
          target: ctx.target,
          product: ctx.product,
          tone: ctx.tone,
          theme: understanding.main_claim,
          inputText: pickPrimaryInputText(input),
          postType: input.type,
          salesTone: ctx.salesTone,
          purpose: input.purpose || ctx.purpose,
          channel: ctx.platform
        }).softFollowup}`, safeConversationCta(ctx.cta, {
          keyword: ctx.keyword,
          target: ctx.target,
          product: ctx.product,
          tone: ctx.tone,
          theme,
          postType: input.type,
          salesTone: ctx.salesTone,
          purpose: input.purpose || ctx.purpose,
          channel: ctx.platform
        })]
      ];
      const text = blocks.map(([title, role, time, body, cta]) => [
        `【${title}】`,
        `役割: ${role}`,
        "",
        "投稿本文:",
        cleanOutput(ctx.platform === "X" ? body.replace(/\n+/g, " ").slice(0, 280) : body),
        "",
        `狙い: ${role}として読者の温度感を上げる`,
        `推奨投稿時間: ${time}`,
        `CTA案: ${cta}`
      ].join("\n")).join("\n\n");
      return { topic: theme, platform: ctx.platform, text: `${text}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function generateRewrite(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("rewrite", input, ctx);
      const source = String(input.source || "").trim();
      const purpose = input.purpose || "親しみやすくする";
      let rewritten = source;
      if (purpose.includes("短く") || purpose.includes("X向け")) rewritten = source.replace(/\n+/g, " ").slice(0, 240);
      else if (purpose.includes("Threads")) rewritten = source.replace(/。/g, "。\n\n").trim();
      else if (purpose.includes("冒頭")) rewritten = `これ、${ctx.target}ほど見落としがちです。\n\n${source}`;
      else if (purpose.includes("締め")) rewritten = `${source}\n\n${naturalQuestionCta({
        keyword: ctx.keyword,
        target: ctx.target,
        product: ctx.product,
        tone: ctx.tone,
        theme: input.theme || input.topic || source,
        postType: input.type,
        salesTone: ctx.salesTone,
        purpose,
        channel: ctx.platform
      })}`;
      else if (purpose.includes("売り込み")) rewritten = source.replace(/買ってください|申し込んでください|必ず/g, "必要なら確認してみてください");
      else rewritten = `${source}\n\nこの投稿で伝えたいのは、${understanding.key_concept}です。\n読者が迷わないように、悩みから次の一歩までを少しだけ整えて見せると伝わりやすくなります。`;
      const text = [
        "【ブラッシュアップ後投稿】",
        cleanOutput(rewritten),
        "",
        "【変更ポイント】",
        `・元文の主張「${understanding.main_claim}」を変えずに調整`,
        `・目的「${purpose}」に合わせて、表現と導線を調整`,
        `・投稿先「${ctx.platform}」に合わせて長さと改行を調整`,
        understanding.metaphor_or_unique_expression ? `・比喩や特徴表現「${understanding.metaphor_or_unique_expression}」を活かす前提で調整` : "・元文の個性を消さず、読みやすさを優先",
        "・売り込み感が強くなりすぎないように余白を残しました",
        "",
        "【元投稿との違い】",
        `${understanding.reader_problem}を先に見せ、元文と違う方向へ広げずに導線だけ自然にしています。`,
        "",
        "【おすすめ用途】",
        purpose.includes("X") ? "X向けの短文化投稿、予約メモ、比較用" : "Threads投稿、返信導線付き投稿、保存型投稿"
      ].join("\n");
      return { topic: "ブラッシュアップ", platform: ctx.platform, text: `${text}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function generateSeries(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("series", input, ctx);
      const days = normalizeCount(input.count, 3);
      const roles = ["問題提起", "原因整理", "具体例", "よくある失敗", "解決策", "行動提案", "返信導線 / 商品案内"];
      const roleBodies = [
        `${understanding.reader_problem}\n\nまずはここを読者の言葉で置きます。`,
        `原因は、${understanding.key_concept}が見えていないことかもしれません。`,
        understanding.metaphor_or_unique_expression || `たとえば、投稿前に何を書くかだけ決めても、誰にどう動いてほしいかが曖昧だと止まりやすくなります。`,
        `よくある失敗は、主張を広げすぎて「結局何の話か」が薄くなることです。`,
        `${understanding.main_claim}\n\nここに戻すと、投稿の流れは整えやすくなります。`,
        `次にやることは、読者の悩みを1つに絞って、自然な問いを最後に置くことです。`
      ];
      const text = Array.from({ length: days }, (_, i) => {
        const role = roles[Math.min(i, roles.length - 1)];
        return [
          `【${i + 1}日目：${role}】`,
          "投稿本文:",
          cleanOutput(`${roleBodies[Math.min(i, roleBodies.length - 1)]}\n\n${i + 1 === days ? safeConversationCta(ctx.cta, {
            keyword: ctx.keyword,
            target: ctx.target,
            product: ctx.product,
            tone: ctx.tone,
            theme: understanding.main_claim,
            inputText: pickPrimaryInputText(input),
            postType: input.type,
            salesTone: ctx.salesTone,
            purpose: input.purpose || ctx.purpose,
            channel: ctx.platform
          }) : "保存して次の投稿で続きも確認してください。"}`),
          "",
          `その日の狙い: ${role}`,
          `推奨投稿時間: ${(state.profile.times || "8:00,12:30,20:30").split(",")[i % 3].trim()}`,
          `CTA案: ${i + 1 === days ? "悩み共有・状況共有の問い" : "保存・次回予告"}`
        ].join("\n");
      }).join("\n\n");
      return { topic: input.theme, platform: ctx.platform, text: `${text}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function generateThread(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("thread", input, ctx);
      const count = normalizeCount(input.count, 3);
      const roles = ["問題提起", "視点転換", "解決策", "補足", "まとめ"];
      const roleBodies = [
        `${understanding.reader_problem}\n\nまずはこの悩みを、1投稿目でそのまま言葉にします。`,
        `そこじゃないです。\n\n本当に見直すのは、${understanding.key_concept}です。`,
        understanding.metaphor_or_unique_expression || `${understanding.main_claim}\n\nここまで絞ると、読者も自分ごとにしやすくなります。`,
        `補足すると、同じCTAを毎回入れるより、投稿ごとに役割を変えた方が自然です。`,
        `${understanding.key_concept}を意識すると、投稿は短く分けても機械的に見えにくくなります。`
      ];
      const text = Array.from({ length: count }, (_, i) => {
        const role = roles[Math.min(i, roles.length - 1)];
        const finalPost = i + 1 === count;
        return [
          `【${i + 1}投稿目：${role}】`,
          "投稿本文:",
          cleanOutput(`${roleBodies[Math.min(i, roleBodies.length - 1)]}\n\n${finalPost ? safeConversationCta(ctx.cta, {
            keyword: ctx.keyword,
            target: ctx.target,
            product: ctx.product,
            tone: ctx.tone,
            theme: understanding.main_claim,
            inputText: pickPrimaryInputText(input),
            postType: input.type,
            salesTone: ctx.salesTone,
            purpose: input.purpose || ctx.purpose,
            channel: ctx.platform
          }) : "ここでは同じCTAを重ねず、次の投稿で視点を変えて続けます。"}`),
          "",
          `役割: ${role}`,
          `つながり説明: ${finalPost ? "最後にだけ自然な返信・保存導線を置きます。" : "投稿間隔を空けながら次の投稿へ自然につなぐ構成です。"}`
        ].join("\n");
      }).join("\n\n");
      return { topic: input.theme, platform: ctx.platform, text: `${text}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function conversationBridgeLine(goal = "", keyword = "", understanding = {}) {
      const text = `${goal} ${keyword}`;
      const concept = displayText(understanding.key_concept || "投稿の流れ");
      if (goal.includes("自己紹介")) return "同じように発信している人が入りやすいように、少しだけ話せる余白を置きます。";
      if (goal.includes("商品案内")) return "売り込みに寄せる前に、まず読者がどこで困っているかを聞ける形に整えます。";
      if (goal.includes("固定投稿")) return "詳しい案内へ急がず、まず見返したくなるポイントを残します。";
      if (goal.includes("プロフィール")) return "いきなり案内せず、必要な人だけプロフィールで確認できる流れにします。";
      if (goal.includes("保存")) return "あとで見返す理由が残るように、問いを少し具体化します。";
      if (text.includes("継続")) return "続かない原因を気合いで片付けず、どこで止まるか話せる形にします。";
      if (text.includes("反応")) return "反応が少ない理由をひとつに決めつけず、見直す場所を選べる問いにします。";
      if (text.includes("案内")) return "案内の前に、言いにくさや迷いを話せる余白を作ります。";
      if (text.includes("自己紹介")) return "自己紹介につながるように、発信テーマを話しやすくします。";
      if (text.includes("設計") || /型|かたち|形|構成/.test(concept)) return "ネタだけを増やすより、先に流れを決める視点へつなげます。";
      return "";
    }

    function buildConversationPost(sourcePost = "", question = "", input = {}, understanding = {}) {
      const body = displayText(sourcePost).trim();
      const goal = input.conversationGoal || input.type || "";
      const bridge = conversationBridgeLine(goal, input.keyword || "", understanding);
      const parts = [body];
      if (bridge && !body.includes(bridge)) parts.push(bridge);
      if (question && !body.includes(question)) parts.push(displayText(question));
      return parts.filter(Boolean).join("\n\n");
    }

    function generateCta(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("cta", input, ctx);
      const guide = buildConversationGuide({
        keyword: input.keyword || ctx.keyword,
        target: ctx.target,
        product: ctx.product,
        tone: ctx.tone,
        theme: understanding.main_claim,
        inputText: input.post || input.theme || input.topic || "",
        postType: input.type || input.post_type || input.conversationGoal || "",
        conversationGoal: input.conversationGoal || input.type || "",
        gift: input.gift || "",
        salesTone: ctx.salesTone,
        purpose: input.purpose || ctx.purpose,
        channel: ctx.platform
      });
      const sourcePost = String(input.post || input.source || input.theme || input.topic || "").trim();
      const completedPost = buildConversationPost(sourcePost, guide.question, input, understanding);
      const text = [

    function generateDiagnostic(feature, input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput(feature, input, ctx);
      const text = input.post || input.postA || input.theme || input.reply || "";
      const lengthScore = Math.max(50, Math.min(92, 100 - Math.abs(text.length - 180) / 4));
      const hasCta = /返信|保存|プロフィール|URL|相談|コメント/.test(text);
      const score = Math.round((lengthScore + (hasCta ? 84 : 62)) / 2);
      const threadSegmentCount = Math.max((String(text).match(/投稿\d+|リプ欄\d+|1投稿目|2投稿目|3投稿目|4投稿目|5投稿目/g) || []).length, String(text).includes("\n---\n") ? String(text).split("\n---\n").length : 0);
      const repeatedCtaCount = (String(text).match(/返信してください|保存して|プロフィール|コメントしてください|URL/g) || []).length;
      const externalGuideCount = (String(text).match(/https?:\/\/|URL|リンク/g) || []).length;
      const prLikeCount = (String(text).match(/PR|広告|案件|提供/g) || []).length;
      const rapidPostingAssumption = /短時間|連投|立て続け|すぐ続けて/g.test(String(text));
      const commentRisk = analyzeCommentInducement(text, {
        keyword: input.keyword || ctx.keyword,
        target: ctx.target,
        product: ctx.product,
        tone: ctx.tone,
        theme: input.theme || input.topic || text,
        postType: input.type || input.post_type || "",
        salesTone: ctx.salesTone,
        purpose: input.purpose || ctx.purpose,
        channel: ctx.platform
      });
      const threadRiskScore = (threadSegmentCount >= 4 ? 2 : 0) + (repeatedCtaCount >= 2 ? 1 : 0) + (externalGuideCount >= 2 ? 1 : 0) + (prLikeCount >= 2 ? 1 : 0) + (rapidPostingAssumption ? 1 : 0);
      const threadRiskLabel = threadRiskScore >= 4 ? "高" : threadRiskScore >= 2 ? "中" : "低";
      const threadRiskMessage = threadRiskLabel === "低"
        ? "連投リスク: 低\n投稿数と導線の重なりは強くありません。最後の投稿だけ軽くCTAを置く構成を維持してください。"
        : `連投リスク: ${threadRiskLabel}\n同じテーマで複数投稿する構成です。CTAは最後だけにし、投稿間隔を空けることをおすすめします。`;
      const commentRiskMessage = commentRisk.label === "低"
        ? "コメント誘導リスク: 低\n読者が自然に話しやすい問いに寄っています。"
        : `コメント誘導リスク: ${commentRisk.label}\nキーワード返信型のCTAが含まれています。連続使用すると返信稼ぎに見える可能性があります。\n自然な悩み共有や状況共有の問いへ弱めることをおすすめします。`;
      const improvementCandidates = conversationImprovementCandidates({
        keyword: input.keyword || ctx.keyword,
        target: ctx.target,
        product: ctx.product,
        tone: ctx.tone,
        theme: input.theme || input.topic || text,
        postType: input.type || input.post_type || "",
        salesTone: ctx.salesTone,
        purpose: input.purpose || ctx.purpose,
        channel: ctx.platform
      });
      const improvementBlock = improvementCandidates.map((item, index) => `改善案${index + 1}:\n${item}`).join("\n\n");
      const outputs = {
        viral: `総合スコア: ${score}/100\n冒頭スコア: ${Math.min(92, score + 4)}\n共感スコア: ${Math.max(55, score - 3)}\n保存スコア: ${hasCta ? 78 : 64}\n返信誘導スコア: ${hasCta ? 82 : 58}\n売り込み感スコア: ${String(text).includes("買") ? "やや強い" : "低め"}\n${threadRiskMessage}\n${commentRiskMessage}\n改善案: 「〇〇と返信してください」ではなく、読者の悩みや状況を聞く自然な問いへ弱めると安全寄りです。\n\n入力理解:\n・主張: ${understanding.main_claim}\n・読者の悩み: ${understanding.reader_problem}\n・注意点: ${understanding.risk_points.join(" / ")}\n\n改善ポイント:\n・入力文の主張からズレない\n・CTAを1つに限定する\n・断定ではなく「可能性があります」と表現する\n${commentRisk.reasons.length ? `・判定理由: ${commentRisk.reasons.join(" / ")}\n` : ""}\n改善後投稿:\n${openingLine(input.genre || ctx.genre, ctx.target, input.purpose, understanding)}\n\nまずは悩みを1つに絞って、保存または返信しやすい形に整えてみてください。\n\n※スコアはAI推定であり、実績を保証するものではありません。`,
        "ab-test": `伝わりやすい可能性が高い案: ${String(input.postA || "").length <= String(input.postB || "").length ? "A" : "B"}\n保存されやすい方: ${String(input.postA || "").includes("チェック") ? "A" : "B"}\n返信されやすい方: ${String(input.postA || "").includes("返信") ? "A" : "B"}\n売り込み感が弱い方: ${String(input.postA || "").includes("申込") ? "B" : "A"}\n\n改善案:\n冒頭は強い方を使い、CTAは自然な方を採用します。\n\n統合投稿文:\n${openingLine(input.purpose || ctx.purpose, ctx.target, input.purpose)}\n\n${String(input.postA || input.postB || "").slice(0, 180)}\n\n${ctx.cta}`,
        "buzz-research": `AIが提案するトーク自然発生テーマ\n\n1. ${input.theme}で会話が止まる理由\n会話が生まれやすい理由: 読者の悩みが具体的で共感されやすい\nおすすめ投稿型: 失敗談型\n想定読者の悩み: 頑張っているのに反応がない\n\n2. ${input.theme}を保存される投稿に変える方法\n会話が生まれやすい理由: 手順化しやすく保存されやすい\nおすすめ投稿型: チェックリスト型\n想定読者の悩み: 何を書けばよいかわからない\n\n3. ${input.theme}から自然な相談導線を作る流れ\n会話が生まれやすい理由: 実務に直結するため状況共有につながりやすい\nおすすめ投稿型: 商品導線型`,
        "buzz-pattern": `注意表現チェック\n\n${commentRiskMessage}\n\n入力文の主張:\n${understanding.main_claim}\n\n返信稼ぎや特典誘導に見える可能性があります。\n自然な質問文へ弱めることをおすすめします。\n${commentRisk.reasons.length ? `\n判定理由:\n- ${commentRisk.reasons.join("\n- ")}\n` : ""}\n例:\n・「〇〇と返信してください」\n・「DMください」\n・「欲しい人はコメント」\n\n${improvementBlock}`
      };
      return { topic: input.theme || pageMeta[feature]?.[0] || feature, platform: ctx.platform, text: `${cleanOutput(outputs[feature] || outputs.viral)}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function generateBulk(input, request) {
      const ctx = profileContext(input);
      const understanding = analyzeUserInput("bulk-generate", input, ctx);
      const base = input.topic || input.theme || ctx.genre;
      const angles = [
        ["共感角度", `${understanding.reader_problem}\n\nここを最初に言葉にすると、読者は自分の話として読みやすくなります。`, "読者の悩みをそのまま拾う"],
        ["保存角度", `${understanding.key_concept}\n\n見返すポイントは、悩み・原因・次の行動の3つです。`, "後で見返せる整理"],
        ["導線角度", `${understanding.main_claim}\n\n必要な人だけが次に進めるように、最後は自然な問いで終えます。\n\n${naturalQuestionCta({ keyword: ctx.keyword, target: ctx.target, product: ctx.product, tone: ctx.tone, theme: understanding.main_claim, inputText: pickPrimaryInputText(input), postType: input.type, salesTone: ctx.salesTone, purpose: input.purpose || ctx.purpose, channel: ctx.platform })}`, "自然な会話導線"]
      ];
      const text = angles.map(([angle, body, aim], i) => [
        `【候補 ${i + 1}】${base} / ${angle}`,
        `投稿案: ${cleanOutput(body)}`,
        `狙い: ${aim}`
      ].join("\n")).join("\n\n");
      return { topic: base, platform: ctx.platform, text: `${text}${formatCommonFooter(ctx, request)}`, promptPreview: request.prompt.slice(0, 500) };
    }

    function generateText(feature, input = getAiInput(feature)) {
      const request = buildAiRequest(feature, input);
      const generators = {
        "ai-post": generateAiPost,
        "day-generate": generateDayPosts,
        rewrite: generateRewrite,
        series: generateSeries,
        thread: generateThread,
        cta: generateCta,
        "bulk-generate": generateBulk,
        viral: generateDiagnostic,
        "ab-test": generateDiagnostic,
        "buzz-research": generateDiagnostic,
        "buzz-pattern": generateDiagnostic
      };
      if (["viral", "ab-test", "buzz-research", "buzz-pattern"].includes(feature)) {
        return generateDiagnostic(feature, input, request);
      }
      const generator = generators[feature] || generateBulk;
      return generator(input, request);
    }

    function updateFollowerAnalysis(v) {
      const current = Number(String(v.current || "0").replace(/,/g, "")) || 0;
      const previous = Number(String(v.previous || "0").replace(/,/g, "")) || 0;
      const saves = Number(String(v.saves || "0").replace(/,/g, "")) || 0;
      const replies = Number(String(v.replies || "0").replace(/,/g, "")) || 0;
      const posts = Number(String(v.posts || "0").replace(/,/g, "")) || 0;
      const diff = current - previous;
      const growthNumber = previous ? (diff / previous) * 100 : 0;
      const growth = growthNumber.toFixed(1);
      const progress = Math.min(100, Math.max(4, Math.abs(growthNumber) / 30 * 100)).toFixed(0);
      const sign = diff >= 0 ? "+" : "";
      const donut = document.querySelector("#followerDonut");
      const rate = document.querySelector("#growthRateLabel");
      const count = document.querySelector("#growthCountLabel");
      const save = document.querySelector("#saveCountLabel");
      const reply = document.querySelector("#replyCountLabel");
      const post = document.querySelector("#postCountLabel");
      if (donut) {
        donut.style.setProperty("--ring", `${progress}%`);
        donut.style.setProperty("--progress", `${progress}%`);
      }
      if (rate) rate.textContent = `${sign}${growth}%`;
      if (count) count.textContent = `${sign}${diff.toLocaleString("ja-JP")}`;
      if (save) save.textContent = saves.toLocaleString("ja-JP");
      if (reply) reply.textContent = replies.toLocaleString("ja-JP");
      if (post) post.textContent = posts.toLocaleString("ja-JP");
      return { growth, sign, diff, saves, replies, posts };
    }

      if (saveTextButton) {
        if (isPreviewMode()) return blockPreviewAction();
        addPost(saveTextButton.dataset.saveText, saveTextButton.dataset.type || "生成履歴");
        return;
      }
      const scheduleButton = event.target.closest("[data-send-schedule]");
      if (scheduleButton) {
        if (isPreviewMode()) return blockPreviewAction(scheduleButton.dataset.sendSchedule);
        const target = document.querySelector(scheduleButton.dataset.sendSchedule);
        const channelSelector = document.querySelector("main [name='channel']");
        const cached = generatedResultCache.get(scheduleButton.dataset.sendSchedule);
        const scheduleRecord = cached
          ? normalizePostRecord({
              ...cached,
              id: `schedule_${Date.now()}`,
              status: "予約メモ",
              statusCode: "scheduled_memo",
              date: "",
              time: ""
            }, cached.feature_label || "AI生成", "予約メモ")
          : normalizePostRecord({
              id: `schedule_${Date.now()}`,
              date: "",
              time: "",
              channel: channelSelector ? channelSelector.value : "Threads",
              status: "予約メモ",
              statusCode: "scheduled_memo",
              text: target ? (target.dataset.copyText || target.innerText) : "",
              feature_label: "AI生成",
              type: "AI生成",
              content_mode: "single",
              group_type: "単発",
              createdAt: new Date().toISOString(),
              created: new Date().toLocaleString("ja-JP")
            }, "AI生成", "予約メモ");
        state.schedules.unshift(scheduleRecord);
        saveState();
        showToast("予約メモに追加しました");
        return;
      }
      if (event.target.closest("[data-night-boost]")) {
        if (isPreviewMode()) return blockPreviewAction();
        showToast("夜投稿の導線を強化しました");
      }
    });

    function openMobileMenu() {
      mobileMenuOverlay.classList.add("open");
      mobileMenuOverlay.setAttribute("aria-hidden", "false");
      document.body.classList.add("menu-open");
    }
    mobileMenuBtn.addEventListener("click", openMobileMenu);
    function closeMobileMenu() {
      mobileMenuOverlay.classList.remove("open");
      mobileMenuOverlay.setAttribute("aria-hidden", "true");
      document.body.classList.remove("menu-open");
    }
    mobileMenuClose.addEventListener("click", closeMobileMenu);
    mobileMenuOverlay.addEventListener("click", (event) => {
      if (event.target === mobileMenuOverlay) closeMobileMenu();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeMobileMenu();
    });
    window.addEventListener("popstate", () => renderPage(currentPage()));

    bootApp();
    if (location.href.includes("menu=open")) {
      openMobileMenu();
      setTimeout(openMobileMenu, 80);
      window.addEventListener("load", openMobileMenu, { once: true });
    }

    async function bootApp() {
      if (isPreviewMode()) {
        renderPage(currentPage(), { keepScroll: true });
        return;
      }
      const authenticated = await syncSessionFromServer();
      if (!authenticated) {
        const next = `${location.pathname}${location.search}`;
        location.replace(isAdminViewRequested() ? `/admin/login?next=${encodeURIComponent(next)}` : `/login?next=${encodeURIComponent(next)}`);
        return;
      }
      await handleThreadsOAuthReturn();
      renderPage(currentPage(), { keepScroll: true });
    }

    async function handleThreadsOAuthReturn() {
      const params = new URLSearchParams(location.search);
      const result = params.get("threads_oauth");
      if (!result) {
        await syncThreadsOAuthStatus({ silent: true });
        return;
      }
      const reason = params.get("reason") || "";
      if (result === "connected") {
        await syncThreadsOAuthStatus({ silent: true });
        showToast("Threads連携が完了しました");
      } else if (result === "app_not_configured") {
        showToast("管理画面でMeta App IDとThreads App Secretを設定してください");
      } else if (result === "denied") {
        showToast(reason ? `Threads連携が拒否されました：${reason}` : "Threads連携がキャンセルされました");
      } else {
        showResult("#threadsApiStatus", `Threads連携に失敗しました。${reason ? `\n原因: ${reason}` : ""}\nMetaアプリ側のリダイレクトURI登録と、Threadsテスター登録（開発モード時）をご確認ください。`, true);
        showToast(reason ? `Threads連携に失敗：${reason}`.slice(0, 80) : "Threads連携に失敗しました。Meta設定と権限を確認してください");
      }
      params.delete("threads_oauth");
      params.delete("reason");
      const nextQuery = params.toString();
      const nextUrl = `${location.pathname}${nextQuery ? `?${nextQuery}` : ""}${location.hash}`;
      history.replaceState(null, "", nextUrl);
    }

    async function syncSessionFromServer() {
      if (isPreviewMode()) return true;
      if (isAdminViewRequested()) {
        return await syncAdminSessionFromServer();
      }
      try {
        const response = await fetch("/api/auth/session", { credentials: "include" });
        if (!response.ok) return false;
        const data = await response.json();
        if (!data.ok || !data.user) return false;
        state.role = data.user.role || state.role;
        state.plan = data.user.plan || state.plan;
        if (state.role === "admin") {
          state.plan = "admin_full";
          state.planLabel = "管理者フルアクセス";
          state.allFeatures = true;
          state.trialLimited = false;
          state.canAccessAdmin = true;
          state.realAdmin = true;
          localStorage.removeItem("sns-mnm-pro-role");
        } else {
          state.realAdmin = false;
          state.demoView = null;
          state.planLabel = data.user.plan === "pro" ? "Proプラン" : data.user.plan === "lite" ? "Liteプラン" : "無料トライアル";
          state.trialLimited = data.user.plan === "trial";
          if (data.user.trialStartedAt) state.trialStartedAt = data.user.trialStartedAt;
          if (data.user.trialExpiresAt) state.trialExpiresAt = data.user.trialExpiresAt;
          if (data.user.trialStatus) state.trialStatus = data.user.trialStatus;
          localStorage.removeItem("sns-mnm-pro-role");
        }
        await syncOpenAiSettingsFromServer();
        saveState();
        return true;
      } catch {
        return false;
      }
    }

    async function syncAdminSessionFromServer() {
      try {
        const response = await fetch("/api/admin/me", { credentials: "include" });
        if (!response.ok) return false;
        const data = await response.json();
        if (!data.ok || !data.admin) return false;
        state.role = "admin";
        state.plan = "admin_full";
        state.planLabel = data.admin.planLabel || "管理者フルアクセス";
        state.realAdmin = true;
        state.allFeatures = true;
        state.trialLimited = false;
        state.canUseAllPlans = true;
        state.canUseAllAiFeatures = true;
        state.canAccessAdmin = true;
        localStorage.removeItem("sns-mnm-pro-role");
        await syncOpenAiSettingsFromServer();
        saveState();
        return true;
      } catch {
        return false;
      }
    }

    async function syncOpenAiSettingsFromServer() {
      try {
        const data = await apiFetchJson("/api/settings/openai", { method: "GET" });
        state.apiKeyConfigured = Boolean(data.openai?.configured);
        state.apiKeyLast4 = data.openai?.key_last4 || "";
        state.modelQuality = modelLabelFromMode(data.openai?.model_mode || "standard");
      } catch {
        // Keep local UI state if the settings endpoint is unavailable.
      }
    }
  </script>
</body>
</html>
