<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理者ログアウト | SNS MNM-PRO</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(8, 23, 42, .94);
      --line: rgba(78, 121, 153, .32);
      --text: #f6fbff;
      --muted: #9fbad4;
      --soft: #cfe8ff;
      --cyan: #20d4c7;
      --blue: #2e89e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(32, 212, 199, .18), transparent 28%),
        radial-gradient(circle at 86% 10%, rgba(46, 137, 232, .18), transparent 28%),
        linear-gradient(135deg, #06111f 0%, #071b2e 48%, #092743 100%);
    }
    a, button, p, h1, div, span { overflow-wrap: anywhere; word-break: break-word; }
    .wrap { width: min(460px, 100%); display: grid; gap: 16px; }
    .panel {
      display: grid;
      gap: 14px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
      text-align: center;
    }
    h1 { margin: 0; font-size: clamp(24px, 6vw, 32px); }
    p { margin: 0; color: var(--soft); line-height: 1.75; }
    .status { min-height: 24px; color: #9ef2e7; font-weight: 900; }
    .actions { display: grid; gap: 10px; }
    .primary, .ghost {
      min-height: 48px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .primary { background: linear-gradient(105deg, var(--cyan), var(--blue)); }
    .ghost { background: rgba(11, 27, 46, .78); color: var(--soft); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>管理者ログアウト</h1>
      <p>管理者セッションだけを終了します。購入者ログイン状態には影響しません。</p>
      <div class="status" id="logoutStatus">管理者ログアウトを実行しています...</div>
      <div class="actions">
        <button class="primary" id="logoutBtn" type="button">管理者ログアウトを実行</button>
        <a class="ghost" href="/admin/login/">管理者ログインへ戻る</a>
      </div>
    </section>
  </main>

  <script>
    const statusNode = document.querySelector("#logoutStatus");
    const next = new URLSearchParams(location.search).get("next") || "/admin/login/";

    async function runLogout() {
      try {
        statusNode.textContent = "管理者ログアウトを実行しています...";
        const response = await fetch("/api/auth/admin-logout", {
          method: "POST",
          credentials: "include"
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || "管理者ログアウトに失敗しました");
        }
        statusNode.textContent = "管理者ログアウトが完了しました。ログイン画面へ移動します...";
        window.setTimeout(() => {
          location.href = next;
        }, 900);
      } catch (error) {
        statusNode.textContent = error.message || "管理者ログアウトに失敗しました";
      }
    }

    document.querySelector("#logoutBtn")?.addEventListener("click", runLogout);
    runLogout();
  </script>
</body>
</html>
