<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理者ログイン | SNS MNM-PRO</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(8, 23, 42, .94);
      --line: rgba(78, 121, 153, .32);
      --text: #f6fbff;
      --muted: #9fbad4;
      --soft: #cfe8ff;
      --cyan: #20d4c7;
      --blue: #2e89e8;
      --violet: #8d6bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 20%, rgba(32, 212, 199, .16), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(141, 107, 255, .18), transparent 30%),
        linear-gradient(135deg, #06111f 0%, #071b2e 48%, #092743 100%);
    }
    a, button, input, p, h1, label, span, div {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .login {
      width: min(420px, 100%);
      display: grid;
      gap: 16px;
    }
    .brand {
      display: grid;
      justify-items: center;
      gap: 10px;
      text-align: center;
    }
    .brand img {
      width: min(280px, 90%);
      border-radius: 14px;
      border: 1px solid rgba(78, 121, 153, .28);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 6.4vw, 34px);
      letter-spacing: 0;
    }
    .panel {
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    label {
      display: grid;
      gap: 7px;
      color: var(--soft);
      font-weight: 900;
      font-size: 13px;
    }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(169, 201, 232, .18);
      border-radius: 11px;
      background: rgba(5, 14, 27, .9);
      color: white;
      padding: 0 13px;
      font: inherit;
    }
    input:focus {
      outline: none;
      border-color: rgba(32, 212, 199, .62);
      box-shadow: 0 0 0 3px rgba(32, 212, 199, .10);
    }
    .primary, .secondary {
      min-height: 46px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .primary {
      width: 100%;
      background: linear-gradient(105deg, var(--violet), var(--blue));
      box-shadow: 0 16px 35px rgba(46, 137, 232, .25);
    }
    .secondary {
      color: var(--soft);
      background: rgba(11, 27, 46, .78);
    }
    .auth-message {
      min-height: 22px;
      color: #9ef2e7;
      text-align: center;
      font-weight: 900;
      line-height: 1.5;
    }
    .footer {
      display: grid;
      gap: 4px;
      justify-items: center;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.7;
    }
    .footer a { color: #cfe8ff; font-weight: 900; text-decoration: none; }
    @media (max-width: 430px) {
      body { padding: 16px; }
      .panel { padding: 16px; }
    }
  </style>
</head>
<body>
  <main class="login">
    <section class="brand" aria-label="SNS MNM-PRO 管理者ログイン">
      <img src="../../assets/sns-mnm-pro-logo-20260621.jpg" alt="SNS MNM-PRO KOUCHA-LAB.COM">
      <h1>SNS MNM-PRO 管理者ログイン</h1>
    </section>

    <div class="auth-message" id="authMessage" aria-live="polite"></div>
    <form class="panel" id="adminLoginPanel">
      <label>メールアドレス<input id="adminEmail" type="email" autocomplete="email" placeholder="admin@example.com"></label>
      <label>パスワード<input id="adminPassword" type="password" autocomplete="current-password" placeholder="password"></label>
      <button class="primary" id="adminLoginBtn" type="button">ログイン</button>
        <a class="secondary" href="/admin/logout/">管理者ログアウト</a>
      <a class="secondary" href="/login.html">通常ログインへ戻る</a>
    </form>

    <footer class="footer">
      <div>© KOUCHA-LAB</div>
    </footer>
  </main>
  <script>
    const authMessage = document.querySelector("#authMessage");

    function showMessage(message) {
      authMessage.textContent = message || "";
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({ ok: false, error: "レスポンスの読み取りに失敗しました" }));
      if (!response.ok || !data.ok) throw new Error(data.error || "ログインに失敗しました");
      return data;
    }

    document.querySelector("#adminLoginBtn").addEventListener("click", async () => {
      const email = document.querySelector("#adminEmail").value.trim();
      const password = document.querySelector("#adminPassword").value;
      if (!email || !password) {
        showMessage("メールアドレスとパスワードを入力してください");
        return;
      }
      try {
        showMessage("管理者ログインを確認しています...");
        const result = await postJson("/api/auth/admin-login", { email, password });
        location.href = result.redirect || "/admin";
      } catch (error) {
        showMessage(error.message);
      }
    });
  </script>
</body>
</html>
