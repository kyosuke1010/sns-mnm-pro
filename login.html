<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | SNS MNM-PRO</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(8, 23, 42, .94);
      --line: rgba(78, 121, 153, .32);
      --text: #f6fbff;
      --muted: #9fbad4;
      --soft: #cfe8ff;
      --cyan: #20d4c7;
      --blue: #2e89e8;
      --violet: #8d6bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 18%, rgba(32, 212, 199, .18), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(46, 137, 232, .18), transparent 30%),
        linear-gradient(135deg, #06111f 0%, #071b2e 48%, #092743 100%);
    }
    a, button, input, p, h1, h2, label, span, div {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .login {
      width: min(430px, 100%);
      display: grid;
      gap: 16px;
    }
    .logo-card {
      min-height: 180px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(6, 17, 31, .74);
      box-shadow: 0 24px 80px rgba(0,0,0,.38);
      overflow: hidden;
      opacity: 0;
      animation: logoFloatIn 1.8s cubic-bezier(.2, .8, .2, 1) .12s forwards;
    }
    .main-logo {
      width: 100%;
      height: 100%;
      min-height: 180px;
      object-fit: cover;
      display: block;
      animation: logoSoftFloat 8s ease-in-out 2s infinite;
    }
    @keyframes logoFloatIn {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(1.035);
        filter: blur(8px) saturate(.9);
      }
      58% {
        opacity: .84;
        filter: blur(2px) saturate(1.04);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0) saturate(1);
      }
    }
    @keyframes logoSoftFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-5px) scale(1.01); }
    }
    .login-copy {
      text-align: center;
      display: grid;
      gap: 6px;
    }
    .login-copy h1 {
      margin: 0;
      font-size: clamp(28px, 9vw, 42px);
      letter-spacing: 0;
    }
    .login-copy p {
      margin: 0;
      color: var(--soft);
      line-height: 1.7;
      font-weight: 700;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(7, 18, 33, .88);
    }
    .tab-btn, .primary, .secondary {
      min-height: 46px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .tab-btn {
      background: transparent;
      color: var(--muted);
    }
    .tab-btn.active {
      color: white;
      background: linear-gradient(105deg, var(--cyan), var(--blue));
    }
    .panel {
      display: none;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    .panel.active { display: grid; }
    label {
      display: grid;
      gap: 7px;
      color: var(--soft);
      font-weight: 900;
      font-size: 13px;
    }
    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(169, 201, 232, .18);
      border-radius: 11px;
      background: rgba(5, 14, 27, .9);
      color: white;
      padding: 0 13px;
      font: inherit;
    }
    input:focus {
      outline: none;
      border-color: rgba(32, 212, 199, .62);
      box-shadow: 0 0 0 3px rgba(32, 212, 199, .10);
    }
    .primary {
      width: 100%;
      background: linear-gradient(105deg, var(--cyan), var(--blue));
      box-shadow: 0 16px 35px rgba(25, 121, 205, .28);
    }
    .secondary {
      color: var(--soft);
      background: rgba(11, 27, 46, .78);
    }
    .note, .footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.7;
    }
    .auth-message {
      min-height: 22px;
      color: #9ef2e7;
      text-align: center;
      font-weight: 900;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 12px;
      justify-content: center;
      font-size: 12px;
      line-height: 1.5;
    }
    .links a, .footer a {
      color: #cfe8ff;
      font-weight: 900;
      text-decoration: none;
    }
    .footer {
      display: grid;
      gap: 4px;
      justify-items: center;
    }
    @media (max-width: 430px) {
      body { padding: 16px; }
      .panel { padding: 16px; }
      .logo-card, .main-logo { min-height: 150px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .logo-card, .main-logo {
        animation: none;
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <main class="login">
    <section class="logo-card" aria-label="SNS MNM-PRO">
      <img class="main-logo" src="./assets/sns-mnm-pro-logo-20260621.jpg" alt="SNS MNM-PRO KOUCHA-LAB.COM">
    </section>
    <div class="login-copy">
      <h1>SNS MNM-PRO</h1>
      <p>Threads投稿から見込み客化、投稿管理まで支援するAI運用ツール</p>
    </div>

    <div class="tabs" role="tablist" aria-label="ログイン種別">
      <button class="tab-btn active" type="button" data-tab="login">ログイン</button>
      <button class="tab-btn" type="button" data-tab="register">初回登録</button>
    </div>
    <div class="auth-message" id="authMessage" aria-live="polite"></div>

    <form class="panel active" id="loginPanel">
      <label>メールアドレス<input id="loginEmail" type="email" autocomplete="email" placeholder="you@example.com"></label>
      <label>パスワード<input id="loginPassword" type="password" autocomplete="current-password" placeholder="password"></label>
      <label>ライセンスキーでログインする場合<input id="loginLicenseKey" type="text" placeholder="SNS-MNM-XXXX-XXXX-XXXX"></label>
      <button class="primary" id="loginBtn" type="button">ログイン</button>
      <a class="secondary" href="mailto:support@koucha-lab.com?subject=SNS%20MNM-PRO%20%E3%83%91%E3%82%B9%E3%83%AF%E3%83%BC%E3%83%89%E5%86%8D%E8%A8%AD%E5%AE%9A">パスワードを忘れた方</a>
      <p class="note">通常はメールアドレスとパスワードでログインします。パスワード未設定の購入者は、メールアドレスとライセンスキーでもログインできます。</p>
    </form>

    <form class="panel" id="registerPanel">
      <label>メールアドレス<input id="registerEmail" type="email" autocomplete="email" placeholder="you@example.com"></label>
      <label>ライセンスキー<input id="licenseKey" type="text" placeholder="SNS-MNM-XXXX-XXXX-XXXX"></label>
      <label>パスワード<input id="registerPassword" type="password" autocomplete="new-password" placeholder="8文字以上"></label>
      <label>パスワード確認<input id="registerPasswordConfirm" type="password" autocomplete="new-password" placeholder="もう一度入力"></label>
      <button class="primary" id="registerBtn" type="button">アカウントを作成</button>
      <p class="note">購入後に発行されたライセンスキーを入力してください。初期版では決済確認後、通常24時間以内にライセンスキーをメールでお送りします。</p>
    </form>

    <div class="links">
      <a href="/legal">特定商取引法に基づく表記</a> <a href="/terms">利用規約</a> <a href="/privacy">プライバシーポリシー</a> <a href="/data-deletion">データ削除</a>
      <a href="/logout">ログアウト</a> <a href="mailto:support@koucha-lab.com">お問い合わせ</a>
    </div>
    <footer class="footer">
      <div>© KOUCHA-LAB</div>
      <div>お問い合わせ：<a href="mailto:support@koucha-lab.com">support@koucha-lab.com</a></div>
    </footer>
  </main>
  <script>
    const tabs = document.querySelectorAll("[data-tab]");
    const panels = {
      login: document.querySelector("#loginPanel"),
      register: document.querySelector("#registerPanel")
    };
    const authMessage = document.querySelector("#authMessage");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.toggle("active", item === tab));
        Object.entries(panels).forEach(([key, panel]) => panel.classList.toggle("active", key === tab.dataset.tab));
        showMessage("");
      });
    });

    function showMessage(message) {
      authMessage.textContent = message || "";
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({ ok: false, error: "通信エラーが発生しました" }));
      if (!response.ok || !data.ok) throw new Error(data.error || "処理に失敗しました");
      return data;
    }

    document.querySelector("#loginBtn").addEventListener("click", async () => {
      const email = document.querySelector("#loginEmail").value.trim();
      const password = document.querySelector("#loginPassword").value;
      const licenseKey = document.querySelector("#loginLicenseKey").value.trim();
      if (!email || (!password && !licenseKey)) {
        showMessage("メールアドレスと、パスワードまたはライセンスキーを入力してください");
        return;
      }
      try {
        showMessage("ログインしています...");
        const payload = licenseKey ? { email, license_key: licenseKey } : { email, password };
        const result = await postJson("/api/auth/login", payload);
        localStorage.removeItem("sns-mnm-pro-role");
        location.href = result.redirect || "./index.html?page=dashboard";
      } catch (error) {
        showMessage(error.message);
      }
    });

    document.querySelector("#registerBtn").addEventListener("click", async () => {
      const email = document.querySelector("#registerEmail").value.trim();
      const licenseKey = document.querySelector("#licenseKey").value.trim();
      const password = document.querySelector("#registerPassword").value;
      const confirm = document.querySelector("#registerPasswordConfirm").value;
      if (!email || !licenseKey || !password || !confirm) {
        showMessage("初回登録に必要な項目を入力してください");
        return;
      }
      if (password !== confirm) {
        showMessage("パスワード確認が一致しません");
        return;
      }
      try {
        showMessage("アカウントを作成しています...");
        const result = await postJson("/api/auth/register", {
          email,
          license_key: licenseKey,
          password,
          password_confirm: confirm
        });
        localStorage.removeItem("sns-mnm-pro-role");
        localStorage.setItem("sns-mnm-pro-initial-registration", JSON.stringify({ email, licenseLast4: licenseKey.slice(-4), registeredAt: new Date().toISOString() }));
        location.href = result.redirect || "./index.html?page=settings";
      } catch (error) {
        showMessage(error.message);
      }
    });
  </script>
</body>
</html>
