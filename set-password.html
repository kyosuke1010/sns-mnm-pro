<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワード設定 | SNS MNM-PRO</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;
      background:linear-gradient(180deg,#04101c 0%,#061728 44%,#071a2c 100%);
      color:#f6fbff;font-family:Inter,"Noto Sans JP","Yu Gothic UI",system-ui,sans-serif}
    main{width:min(440px,100%);border:1px solid rgba(78,121,153,.34);border-radius:16px;
      background:rgba(8,23,42,.94);padding:26px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
    h1{font-size:21px;margin:0 0 6px}
    p.lead{color:#a9c9e8;line-height:1.7;font-size:14px;margin:0 0 18px}
    label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;color:#dbeeff}
    input{width:100%;min-height:46px;padding:0 12px;border-radius:10px;border:1px solid rgba(78,121,153,.4);
      background:rgba(6,16,28,.8);color:#fff;font-size:15px}
    button{width:100%;min-height:50px;margin-top:18px;border:0;border-radius:12px;font-weight:900;font-size:15px;
      color:#fff;background:linear-gradient(135deg,#20d4c7,#2e89e8);cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:14px;font-size:13px;line-height:1.6;min-height:1em}
    .msg.err{color:#ff9b9b}
    .msg.ok{color:#9bffd0}
    .hint{color:#7fa3c7;font-size:12px;margin-top:6px}
  </style>
</head>
<body>
  <main>
    <h1>パスワードを設定</h1>
    <p class="lead">ご購入ありがとうございます。ログイン用のパスワードを設定してください。設定後、そのままご利用いただけます。</p>
    <form id="form" autocomplete="off">
      <label for="pw">パスワード（8文字以上）</label>
      <input id="pw" name="password" type="password" minlength="8" placeholder="新しいパスワード" required>
      <label for="pw2">パスワード（確認）</label>
      <input id="pw2" name="password_confirm" type="password" minlength="8" placeholder="もう一度入力" required>
      <button id="submit" type="submit">パスワードを設定してはじめる</button>
      <div class="msg" id="msg"></div>
      <div class="hint">リンクの有効期限が切れている場合は、お手数ですが support@koucha-lab.com までご連絡ください。</div>
    </form>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("token") || "";
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const submit = document.getElementById("submit");

    if (!token) {
      msg.className = "msg err";
      msg.textContent = "リンクが正しくありません。メールに記載のリンクから開いてください。";
      submit.disabled = true;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = document.getElementById("pw").value;
      const password_confirm = document.getElementById("pw2").value;
      msg.className = "msg";
      msg.textContent = "";
      if (password.length < 8) { msg.className = "msg err"; msg.textContent = "パスワードは8文字以上で入力してください。"; return; }
      if (password !== password_confirm) { msg.className = "msg err"; msg.textContent = "パスワードが一致しません。"; return; }
      submit.disabled = true;
      msg.textContent = "設定中…";
      try {
        const res = await fetch("/api/auth/set-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password, password_confirm })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.ok) {
          msg.className = "msg ok";
          msg.textContent = "設定しました。移動します…";
          location.href = data.redirect || "/index.html";
        } else {
          msg.className = "msg err";
          msg.textContent = data.error || "設定に失敗しました。";
          submit.disabled = false;
        }
      } catch {
        msg.className = "msg err";
        msg.textContent = "通信に失敗しました。時間をおいて再度お試しください。";
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
