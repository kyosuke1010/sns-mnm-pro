<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログアウト | SNS MNM-PRO</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(8, 23, 42, .94);
      --line: rgba(78, 121, 153, .32);
      --text: #f6fbff;
      --muted: #9fbad4;
      --soft: #cfe8ff;
      --cyan: #20d4c7;
      --blue: #2e89e8;
      --violet: #8d6bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(32, 212, 199, .18), transparent 28%),
        radial-gradient(circle at 86% 10%, rgba(46, 137, 232, .18), transparent 28%),
        linear-gradient(135deg, #06111f 0%, #071b2e 48%, #092743 100%);
    }
    a, button, p, h1, div, span {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .wrap {
      width: min(460px, 100%);
      display: grid;
      gap: 16px;
    }
    .brand {
      display: grid;
      justify-items: center;
      gap: 12px;
      text-align: center;
    }
    .brand img {
      width: min(280px, 92%);
      border-radius: 14px;
      border: 1px solid rgba(78, 121, 153, .28);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
    }
    .panel {
      display: grid;
      gap: 14px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0,0,0,.28);
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 7vw, 34px);
    }
    p {
      margin: 0;
      color: var(--soft);
      line-height: 1.75;
    }
    .status {
      min-height: 24px;
      color: #9ef2e7;
      font-weight: 900;
    }
    .actions {
      display: grid;
      gap: 10px;
    }
    .primary, .ghost {
      min-height: 48px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      display: grid;
      place-items: center;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(105deg, var(--cyan), var(--blue));
      box-shadow: 0 16px 35px rgba(46, 137, 232, .25);
    }
    .ghost {
      background: rgba(11, 27, 46, .78);
      color: var(--soft);
    }
    .footer {
      display: grid;
      gap: 4px;
      justify-items: center;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      line-height: 1.7;
    }
    .footer a { color: #cfe8ff; font-weight: 900; text-decoration: none; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="brand" aria-label="SNS MNM-PRO ログアウト">
      <img src="./assets/sns-mnm-pro-logo-20260621.jpg" alt="SNS MNM-PRO KOUCHA-LAB.COM">
    </section>

    <section class="panel">
      <h1>購入者画面からログアウト</h1>
      <p>同じブラウザで購入者テストと管理画面確認を切り替える時は、先にこの画面で購入者セッションを終了してください。</p>
      <div class="status" id="logoutStatus">購入者セッションを確認しています...</div>
      <div class="actions">
        <button class="primary" id="logoutBtn" type="button">購入者ログアウトを実行</button>
        <a class="ghost" href="/admin/login/">管理者ログインへ</a>
        <a class="ghost" href="/login">購入者ログインへ戻る</a>
      </div>
    </section>

    <footer class="footer">
      <div>© KOUCHA-LAB</div>
      <div>お問い合わせ：<a href="mailto:support@koucha-lab.com">support@koucha-lab.com</a></div>
    </footer>
  </main>

  <script>
    const statusNode = document.querySelector("#logoutStatus");
    const next = new URLSearchParams(location.search).get("next") || "/admin/login/";

    async function runLogout() {
      try {
        statusNode.textContent = "ログアウトしています...";
        const response = await fetch("/api/auth/logout", {
          method: "POST",
          credentials: "include"
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || "ログアウトに失敗しました");
        }
        statusNode.textContent = "購入者ログアウトが完了しました。管理者ログインへ移動します...";
        window.setTimeout(() => {
          location.href = next;
        }, 900);
      } catch (error) {
        statusNode.textContent = error.message || "ログアウトに失敗しました";
      }
    }

    document.querySelector("#logoutBtn")?.addEventListener("click", runLogout);
    runLogout();
  </script>
</body>
</html>
